<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paris Foot — HorizonCiné</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --pitch:#0d1f14;
    --pitch-line:#1e3a26;
    --grass:#2e7d32;
    --flood:#d4ff5a;
    --text:#eef5ea;
    --muted:#8ea88f;
    --live:#ff4d4d;
    --card:#132a1b;
    --win:#4dd67a;
    --lose:#ff6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      repeating-linear-gradient(90deg, var(--pitch) 0 40px, #0f2417 40px 80px);
    color:var(--text);
    font-family:'Segoe UI', system-ui, sans-serif;
    padding:24px 16px 60px;
  }
  header{
    text-align:center;
    margin-bottom:20px;
  }
  header h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:2rem;
    letter-spacing:1px;
    margin:0 0 4px;
    color:var(--flood);
    text-shadow:0 0 18px rgba(212,255,90,0.25);
  }
  header p{margin:0;color:var(--muted);font-size:0.85rem;}

  #balanceBar{
    max-width:720px;
    margin:0 auto 20px;
    background:var(--card);
    border:1px solid var(--pitch-line);
    border-radius:12px;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  #balanceBar .amount{font-size:1.4rem;font-weight:800;color:var(--flood);}
  #balanceBar .label{font-size:0.75rem;color:var(--muted);}

  nav{
    max-width:720px;
    margin:0 auto 20px;
    display:flex;
    gap:8px;
  }
  nav button{
    flex:1;
    background:var(--card);
    border:1px solid var(--pitch-line);
    color:var(--muted);
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:0.85rem;
  }
  nav button.active{
    background:var(--grass);
    color:#06120a;
    border-color:var(--grass);
  }

  .container{max-width:720px;margin:0 auto;}
  .match{
    background:var(--card);
    border:1px solid var(--pitch-line);
    border-radius:12px;
    padding:16px 18px;
    margin-bottom:10px;
  }
  .match-top{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:10px;
  }
  .team{display:flex;align-items:center;gap:8px;font-weight:600;font-size:0.9rem;}
  .team.right{justify-content:flex-end;text-align:right;}
  .team img{width:22px;height:22px;object-fit:contain;}
  .score-block{text-align:center;min-width:70px;}
  .score{font-size:1.4rem;font-weight:800;color:var(--flood);}
  .minute{font-size:0.65rem;color:var(--live);font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;}
  .minute::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite;}
  .kickoff{font-size:0.7rem;color:var(--muted);text-align:center;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}

  .league{font-size:0.65rem;text-transform:uppercase;color:var(--muted);margin-top:10px;}

  .bet-form{
    margin-top:12px;
    padding-top:12px;
    border-top:1px dashed var(--pitch-line);
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  select, input[type=number], input[type=text]{
    background:#0a1810;
    border:1px solid var(--pitch-line);
    color:var(--text);
    padding:7px 9px;
    border-radius:6px;
    font-size:0.8rem;
  }
  input[type=number]{width:80px;}
  input[type=text]{width:60px;}
  .bet-form button{
    background:var(--grass);
    border:none;
    color:#06120a;
    font-weight:700;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    font-size:0.8rem;
  }
  .odds-tag{
    font-size:0.7rem;
    color:var(--muted);
  }

  table{width:100%;border-collapse:collapse;}
  th, td{
    text-align:left;
    padding:8px 10px;
    font-size:0.8rem;
    border-bottom:1px solid var(--pitch-line);
  }
  th{color:var(--muted);text-transform:uppercase;font-size:0.65rem;}
  .status-won{color:var(--win);font-weight:700;}
  .status-lost{color:var(--lose);font-weight:700;}
  .status-pending{color:var(--muted);}

  .rank{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    background:var(--card);
    border:1px solid var(--pitch-line);
    border-radius:10px;
    margin-bottom:6px;
  }
  .rank .pos{color:var(--flood);font-weight:800;width:28px;}

  .empty, .error{text-align:center;color:var(--muted);padding:30px 10px;}
  .error{color:#ff8a8a;}
  #status{text-align:center;color:var(--muted);font-size:0.8rem;margin-bottom:14px;}
  #authGate{max-width:400px;margin:60px auto;text-align:center;color:var(--muted);}
</style>
</head>
<body>

<header>
  <h1>⚽ Paris Foot — HorizonCiné</h1>
  <p>Monnaie 100% fictive. Chaque membre commence avec 100 balles.</p>
</header>

<div id="authGate">Connexion en cours…</div>

<div id="app" style="display:none;">
  <div id="balanceBar">
    <div>
      <div class="label">Ton solde</div>
      <div class="amount" id="balanceAmount">—</div>
    </div>
    <div>
      <div class="label">Connecté en tant que</div>
      <div id="userLabel">—</div>
    </div>
  </div>

  <nav>
    <button id="tabBet" class="active" onclick="switchTab('bet')">Parier</button>
    <button id="tabMine" onclick="switchTab('mine')">Mes paris</button>
    <button id="tabBoard" onclick="switchTab('board')">Classement</button>
  </nav>

  <div id="status"></div>
  <div class="container" id="content"></div>
</div>

<script>
// ==============================
// CONFIG — colle tes identifiants
// ==============================
const SUPABASE_URL = "https://wuagahavmbugmnuzsouf.supabase.co";
const SUPABASE_ANON_KEY = "COLLE_TA_CLE_ANON_SUPABASE_ICI";
const FOOTBALL_API_KEY = "COLLE_TA_CLE_API_FOOTBALL_ICI"; // api-sports.io

const CACHE_MAX_AGE_MS = 5 * 60 * 1000; // 5 minutes
const ODDS = { home: 1.8, draw: 3.0, away: 2.2, score: 8.0 };

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentTab = 'bet';
let matchesData = [];

// ==============================
// AUTH
// ==============================
async function init(){
  const { data: { user } } = await supabase.auth.getUser();
  if(!user){
    document.getElementById('authGate').textContent =
      "Connecte-toi sur HorizonCiné pour accéder aux paris.";
    return;
  }
  currentUser = user;
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userLabel').textContent = user.email || user.id.slice(0,8);

  await refreshBalance();
  await loadMatches();
  renderTab();
}

async function refreshBalance(){
  const { data, error } = await supabase
    .from('profiles')
    .select('balance')
    .eq('id', currentUser.id)
    .single();
  if(!error && data){
    document.getElementById('balanceAmount').textContent = data.balance + " 💰";
  }
}

// ==============================
// TABS
// ==============================
function switchTab(tab){
  currentTab = tab;
  ['tabBet','tabMine','tabBoard'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  renderTab();
}

function renderTab(){
  if(currentTab === 'bet') renderMatches();
  if(currentTab === 'mine') renderMyBets();
  if(currentTab === 'board') renderLeaderboard();
}

// ==============================
// MATCHS (avec cache partagé Supabase)
// ==============================
async function loadMatches(){
  setStatus("Chargement des matchs…");
  const { data: cache } = await supabase
    .from('matches_cache')
    .select('*')
    .eq('id', 1)
    .single();

  const age = cache ? Date.now() - new Date(cache.updated_at).getTime() : Infinity;

  if(cache && age < CACHE_MAX_AGE_MS){
    matchesData = cache.data;
    setStatus("Matchs à jour (cache).");
  } else {
    try{
      const fresh = await fetchFromApiFootball();
      matchesData = fresh;
      await supabase
        .from('matches_cache')
        .update({ data: fresh, updated_at: new Date().toISOString() })
        .eq('id', 1);
      setStatus("Matchs actualisés depuis l'API.");
    }catch(err){
      matchesData = cache ? cache.data : [];
      setStatus("Impossible d'actualiser (quota API ?), affichage du cache.", true);
    }
  }
  await settlePendingBets();
  renderTab();
}

async function fetchFromApiFootball(){
  const today = new Date().toISOString().slice(0,10);
  const [liveRes, todayRes] = await Promise.all([
    fetch("https://v3.football.api-sports.io/fixtures?live=all", {
      headers: { "x-apisports-key": FOOTBALL_API_KEY }
    }),
    fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
      headers: { "x-apisports-key": FOOTBALL_API_KEY }
    })
  ]);
  if(!liveRes.ok || !todayRes.ok) throw new Error("Erreur API");
  const live = (await liveRes.json()).response || [];
  const today_ = (await todayRes.json()).response || [];
  const map = new Map();
  [...live, ...today_].forEach(m => map.set(m.fixture.id, m));
  return Array.from(map.values());
}

// ==============================
// RENDER: PARIER
// ==============================
function renderMatches(){
  const el = document.getElementById('content');
  if(matchesData.length === 0){
    el.innerHTML = `<div class="empty">Aucun match disponible pour le moment.</div>`;
    return;
  }
  el.innerHTML = matchesData.map(m => matchCard(m)).join('');
}

function matchCard(m){
  const home = m.teams.home, away = m.teams.away;
  const goals = m.goals;
  const status = m.fixture.status.short; // NS, 1H, HT, 2H, FT, etc.
  const isLive = ['1H','2H','ET','P','HT'].includes(status);
  const isFinished = status === 'FT' || status === 'AET' || status === 'PEN';
  const kickoff = new Date(m.fixture.date).toLocaleString('fr-FR', {weekday:'short', hour:'2-digit', minute:'2-digit'});

  let scoreBlock;
  if(isLive){
    scoreBlock = `<div class="score">${goals.home ?? 0} - ${goals.away ?? 0}</div><div class="minute">${m.fixture.status.elapsed ?? '--'}'</div>`;
  } else if(isFinished){
    scoreBlock = `<div class="score">${goals.home ?? 0} - ${goals.away ?? 0}</div><div class="kickoff">Terminé</div>`;
  } else {
    scoreBlock = `<div class="score">VS</div><div class="kickoff">${kickoff}</div>`;
  }

  const canBet = !isFinished; // on peut parier tant que le match n'est pas fini
  const fid = m.fixture.id;

  return `
    <div class="match">
      <div class="match-top">
        <div class="team"><img src="${home.logo}" alt="">${home.name}</div>
        <div class="score-block">${scoreBlock}</div>
        <div class="team right">${away.name}<img src="${away.logo}" alt=""></div>
      </div>
      <div class="league">${m.league.name} — ${m.league.country}</div>
      ${canBet ? betForm(fid, home.name, away.name) : `<div class="odds-tag" style="margin-top:10px;">Paris fermés</div>`}
    </div>
  `;
}

function betForm(fixtureId, homeName, awayName){
  return `
    <div class="bet-form">
      <select id="pred_${fixtureId}" onchange="toggleScoreInput(${fixtureId})">
        <option value="home">Victoire ${homeName} (x${ODDS.home})</option>
        <option value="draw">Match nul (x${ODDS.draw})</option>
        <option value="away">Victoire ${awayName} (x${ODDS.away})</option>
        <option value="score">Score exact (x${ODDS.score})</option>
      </select>
      <input type="text" id="scoreInput_${fixtureId}" placeholder="ex: 2-1" style="display:none;">
      <input type="number" id="stake_${fixtureId}" placeholder="Mise" min="1">
      <button onclick="placeBet(${fixtureId}, '${escapeQ(homeName)}', '${escapeQ(awayName)}')">Parier</button>
    </div>
  `;
}

function escapeQ(s){ return s.replace(/'/g, "\\'"); }

function toggleScoreInput(fixtureId){
  const pred = document.getElementById(`pred_${fixtureId}`).value;
  document.getElementById(`scoreInput_${fixtureId}`).style.display = pred === 'score' ? 'inline-block' : 'none';
}

async function placeBet(fixtureId, homeName, awayName){
  const pred = document.getElementById(`pred_${fixtureId}`).value;
  const stake = parseInt(document.getElementById(`stake_${fixtureId}`).value, 10);
  const scoreVal = document.getElementById(`scoreInput_${fixtureId}`).value.trim();

  if(!stake || stake <= 0){
    setStatus("Entre une mise valide.", true);
    return;
  }
  if(pred === 'score' && !/^\d+-\d+$/.test(scoreVal)){
    setStatus("Score invalide, format attendu : 2-1", true);
    return;
  }

  const odds = ODDS[pred];

  const { data, error } = await supabase.rpc('place_bet', {
    p_fixture_id: fixtureId,
    p_home_team: homeName,
    p_away_team: awayName,
    p_prediction: pred,
    p_predicted_score: pred === 'score' ? scoreVal : null,
    p_stake: stake,
    p_odds: odds
  });

  if(error){
    setStatus("Erreur : " + error.message, true);
    return;
  }
  setStatus("Pari enregistré !");
  await refreshBalance();
}

// ==============================
// RENDER: MES PARIS
// ==============================
async function renderMyBets(){
  const el = document.getElementById('content');
  el.innerHTML = `<div class="empty">Chargement…</div>`;
  const { data, error } = await supabase
    .from('bets')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  if(error || !data || data.length === 0){
    el.innerHTML = `<div class="empty">Tu n'as encore parié sur aucun match.</div>`;
    return;
  }

  el.innerHTML = `
    <table>
      <thead><tr><th>Match</th><th>Pari</th><th>Mise</th><th>Statut</th><th>Gain</th></tr></thead>
      <tbody>
        ${data.map(b => `
          <tr>
            <td>${b.home_team} - ${b.away_team}</td>
            <td>${predLabel(b)}</td>
            <td>${b.stake} 💰</td>
            <td class="status-${b.status}">${statusLabel(b.status)}</td>
            <td>${b.status === 'won' ? '+' + b.payout : (b.status === 'lost' ? '-' + b.stake : '—')}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function predLabel(b){
  if(b.prediction === 'home') return b.home_team + ' gagne';
  if(b.prediction === 'away') return b.away_team + ' gagne';
  if(b.prediction === 'draw') return 'Match nul';
  if(b.prediction === 'score') return 'Score exact ' + b.predicted_score;
  return b.prediction;
}
function statusLabel(s){
  return { pending: 'En attente', won: 'Gagné', lost: 'Perdu', void: 'Annulé' }[s] || s;
}

// ==============================
// RENDER: CLASSEMENT
// ==============================
async function renderLeaderboard(){
  const el = document.getElementById('content');
  el.innerHTML = `<div class="empty">Chargement…</div>`;
  const { data, error } = await supabase
    .from('profiles')
    .select('id, username, balance')
    .order('balance', { ascending: false })
    .limit(50);

  if(error || !data){
    el.innerHTML = `<div class="empty">Impossible de charger le classement.</div>`;
    return;
  }

  el.innerHTML = data.map((p, i) => `
    <div class="rank">
      <div><span class="pos">#${i+1}</span> ${p.username || p.id.slice(0,8)}</div>
      <div style="color:var(--flood);font-weight:700;">${p.balance} 💰</div>
    </div>
  `).join('');
}

// ==============================
// RÉSOLUTION AUTOMATIQUE DES PARIS TERMINÉS
// ==============================
async function settlePendingBets(){
  const { data: pending } = await supabase
    .from('bets')
    .select('*')
    .eq('status', 'pending');

  if(!pending || pending.length === 0) return;

  for(const bet of pending){
    const match = matchesData.find(m => m.fixture.id === bet.fixture_id);
    if(!match) continue;
    const status = match.fixture.status.short;
    if(status === 'FT' || status === 'AET' || status === 'PEN'){
      await supabase.rpc('settle_bet', {
        p_bet_id: bet.id,
        p_home_score: match.goals.home ?? 0,
        p_away_score: match.goals.away ?? 0
      });
    }
  }
  await refreshBalance();
}

// ==============================
function setStatus(msg, isError=false){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? "#ff8a8a" : "";
}

init();
</script>

</body>
</html>
