<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paris Foot — HorizonCiné</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=money_bag" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
   @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

   .material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24;
  vertical-align: middle;
  font-size: 1.1em;
  line-height: 1;
  color: var(--accent);
}
   nav {
    background: rgba(10,10,15,.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 60px;
}

.nav-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-decoration: none;
}

nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: .875rem;
    font-weight: 600;
    transition: color .2s;
    margin-right: 1.2rem; /* espace entre les liens */
}

nav a:last-child {
    margin-right: 0;
}

nav a:hover {
    color: var(--text);
}

nav a.active {
    color: var(--accent);
}
:root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #e8b84b;
    --accent2: #c0392b;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --radius: 12px;
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

    --live: #ff5252;
    --win: #5fbf6e;
    --lose: #ff6b6b;
    --flood: var(--win); /* fix: variable manquante utilisée dans renderLeaderboard() */
    --glass: rgba(232, 184, 75, 0.08);
    --shadow-soft: 0 8px 24px -6px rgba(0, 0, 0, 0.6);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
    padding: 24px 16px 80px;
    letter-spacing: 0.1px;
}

/* ---------- TYPOGRAPHY ---------- */
h1, h2, h3 {
    font-family: 'Bebas Neue', cursive;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* ---------- MASTHEAD ---------- */
header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
}

header::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    opacity: 0.6;
}

header h1 {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(232, 184, 75, 0.4);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

header h1:hover {
    transform: scale(1.03);
}

header p {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
    font-family: 'IBM Plex Mono', monospace;
}

/* ---------- BALANCE BAR ---------- */
#balanceBar {
    max-width: 760px;
    margin: 0 auto 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-soft);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
}

#balanceBar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--glass);
    border-radius: var(--radius);
    pointer-events: none;
}

#balanceBar:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
}

#balanceBar .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
}

#balanceBar .amount {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 16px rgba(232, 184, 75, 0.5);
}

/* ---------- NAV TABS ---------- */
nav {
    max-width: 760px;
    margin: 0 auto 28px;
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid var(--border);
}

nav button {
    flex: 1;
    background: var(--card);
    border: none;
    color: var(--muted);
    padding: 14px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: var(--transition);
}

nav button:hover {
    color: var(--text);
    background: var(--surface);
}

nav button.active {
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--accent);
}

/* ---------- MATCH CARD ---------- */
.container {
    max-width: 760px;
    margin: 0 auto;
}

.match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    transition: var(--transition);
}

.match:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
}

.match-top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    padding-bottom: 16px;
}

.team {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
    transition: var(--transition);
}

.team:hover {
    color: var(--accent);
}

.team.right {
    justify-content: flex-end;
    text-align: right;
}

.score {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.75rem, 5vw, 2.4rem);
    font-weight: 700;
    color: var(--accent);
    text-align: center;
}

/* ---------- "EN DIRECT" STYLISÉ + ANIMÉ ---------- */
.minute {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    width: 100%;
    color: var(--live);
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 4px;
}

.minute::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7);
    animation: livePulse 1.4s infinite;
}

@keyframes livePulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.6); }
    70% { box-shadow: 0 0 0 8px rgba(255, 82, 82, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
}

.kickoff {
    text-align: center;
    width: 100%;
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 4px;
}

.league {
    font-size: 0.75rem;
    color: var(--muted);
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* ---------- BET SLIP ---------- */
.bet-form {
    background: var(--surface);
    color: var(--text);
    margin: 20px -20px -20px;
    padding: 20px;
    border-top: 1px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

select, input[type="number"], input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'IBM Plex Sans', sans-serif;
}

select:focus, input:focus {
    border-color: var(--accent);
    outline: none;
}

.bet-form select {
    flex: 1;
    min-width: 180px;
}

.bet-form input[type="number"] {
    width: 100px;
}

.bet-form button {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 700;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    transition: var(--transition);
}

.bet-form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(232, 184, 75, 0.3);
}

.odds-tag {
    font-size: 0.7rem;
    color: var(--muted);
    font-style: italic;
}

/* ---------- MES PARIS (table transformée en cartes) ---------- */
#content table {
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 12px;
}

#content table thead {
    display: none; /* on masque l'en-tête brut, l'info est reprise dans chaque carte */
}

#content table tbody tr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    transition: var(--transition);
}

#content table tbody tr:hover {
    border-color: var(--accent);
    transform: translateX(4px);
}

#content table tbody td {
    display: block;
    padding: 0;
    border: none;
    font-size: 0.85rem;
}

/* Colonne "Match" : nom en avant, prend l'espace dispo */
#content table tbody td:nth-child(1) {
    flex: 1 1 auto;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
}

/* Colonne "Pari" : sous-texte discret sous le nom du match */
#content table tbody td:nth-child(2) {
    flex: 1 1 auto;
    color: var(--muted);
    font-size: 0.75rem;
}

/* Colonne "Mise" : tag doré */
#content table tbody td:nth-child(3) {
    background: var(--glass);
    color: var(--accent);
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    padding: 5px 10px;
    border-radius: 6px;
    margin: 0 8px;
    white-space: nowrap;
}

/* Colonne "Statut" : badge coloré selon l'état */
#content table tbody td:nth-child(4) {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    margin-right: 8px;
}

.status-pending { background: rgba(232, 184, 75, 0.12); color: var(--accent); border: 1px solid rgba(232, 184, 75, 0.4); }
.status-won { background: rgba(95, 191, 110, 0.12); color: var(--win); border: 1px solid rgba(95, 191, 110, 0.4); }
.status-lost { background: rgba(255, 107, 107, 0.12); color: var(--lose); border: 1px solid rgba(255, 107, 107, 0.4); }
.status-void { background: rgba(122, 122, 154, 0.12); color: var(--muted); border: 1px solid var(--border); }

/* Colonne "Gain" : montant en avant, aligné à droite */
#content table tbody td:nth-child(5) {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 0.85rem;
    text-align: right;
    min-width: 60px;
}

/* ---------- CLASSEMENT (centré, style leaderboard) ---------- */
#content .rank {
    max-width: 560px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    transition: var(--transition);
}

#content .rank:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
}

#content .rank .pos {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'Bebas Neue', cursive;
    font-size: 0.95rem;
    color: var(--muted);
    margin-right: 12px;
}

/* Podium doré / argent / bronze pour le top 3 */
#content .rank:nth-child(1) {
    border-color: var(--accent);
    box-shadow: 0 0 20px -6px rgba(232, 184, 75, 0.35);
}
#content .rank:nth-child(1) .pos {
    background: var(--accent);
    color: #0a0a0f;
    border-color: var(--accent);
}

#content .rank:nth-child(2) .pos {
    background: #cfd3da;
    color: #0a0a0f;
    border-color: #cfd3da;
}

#content .rank:nth-child(3) .pos {
    background: #c98a4b;
    color: #0a0a0f;
    border-color: #c98a4b;
}

/* ---------- UTILITIES ---------- */
.empty, .error {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    background: var(--card);
    border-radius: var(--radius);
    max-width: 640px;
    margin: 0 auto;
}

#status {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'IBM Plex Mono', monospace;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 640px) {
    body { padding: 16px 12px 70px; }
    .bet-form { flex-direction: column; align-items: stretch; }
    .bet-form button { width: 100%; }
    #content table tbody tr {
        flex-wrap: wrap;
        gap: 6px;
    }
    #content table tbody td:nth-child(5) {
        text-align: left;
        width: 100%;
    }
}
</style>

<nav>

</nav>
<header>
  <h1>Paris Foot</h1>
  <p>HorizonCiné — Monnaie 100% fictive · Départ 100 <span class="material-symbols-outlined"></span></p>
</header>

<div id="authGate">Connexion en cours…</div>

<div id="app" style="display:none;">
  <div id="balanceBar">
    <div>
      <div class="label">Ton solde</div>
      <div class="amount" id="balanceAmount">—</div>
    </div>
    <div>
      <div class="label">Connecté en tant que</div>
      <div id="userLabel">—</div>
    </div>
  </div>

    <button id="tabBet" class="active" onclick="switchTab('bet')">Parier</button>

<script>
// ==============================
// CONFIG — colle tes identifiants
// ==============================
const SUPABASE_URL = "https://wuagahavmbugmnuzsouf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1YWdhaGF2bWJ1Z21udXpzb3VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI2MDM2NTksImV4cCI6MjA2ODE3OTY1OX0.mjf9cUleV_oq8TsWeKvPVOJSGPc98AyGyfJeA-Tpvho";

// Une seule clé RapidAPI, utilisée pour les deux APIs abonnées sur RapidAPI
const RAPIDAPI_KEY = "e00ebab9f1mshf31ddb456d99a8ep163f41jsnb4b4cd18334b";

// API des cotes / prédictions (Football Prediction API — boggio-analytics)
const PREDICTIONS_HOST = "football-prediction-api.p.rapidapi.com";

const CACHE_MAX_AGE_MS = 5 * 60 * 1000; // 5 minutes
const FALLBACK_ODDS = { home: 1.8, draw: 3.0, away: 2.2 }; // si l'API de cotes ne répond pas

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentTab = 'bet';
let matchesData = [];

// ==============================
// AUTH
// ==============================
async function init(){
  const { data: { user } } = await sb.auth.getUser();
  if(!user){
    document.getElementById('authGate').textContent =
      "Connecte-toi sur HorizonCiné pour accéder aux paris.";
    return;
  }
  currentUser = user;
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userLabel').textContent = user.email || user.id.slice(0,8);

  await refreshBalance();
  await loadMatches();
  renderTab();
}

async function refreshBalance(){
  const { data, error } = await sb
    .from('profiles')
    .select('balance')
    .eq('id', currentUser.id)
    .single();
  if(!error && data){
    document.getElementById('balanceAmount').textContent = data.balance + " 💰";
  }
}

// ==============================
// TABS
// ==============================
function switchTab(tab){
  currentTab = tab;
  ['tabBet','tabMine','tabBoard'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  renderTab();
}

function renderTab(){
  if(currentTab === 'bet') renderMatches();
  if(currentTab === 'mine') renderMyBets();
  if(currentTab === 'board') renderLeaderboard();
}

// ==============================
// MATCHS (avec cache partagé Supabase)
// ==============================
async function loadMatches(){
  setStatus("Chargement des matchs…");
  const { data: cache } = await sb
    .from('matches_cache')
    .select('*')
    .eq('id', 1)
    .single();

  const age = cache ? Date.now() - new Date(cache.updated_at).getTime() : Infinity;

  if(cache && age < CACHE_MAX_AGE_MS){
    matchesData = cache.data;
    setStatus("Matchs à jour (cache).");
  } else {
    try{
      const fresh = await buildMatchesWithOddsAndScores();
      matchesData = fresh;
      await sb
        .from('matches_cache')
        .update({ data: fresh, updated_at: new Date().toISOString() })
        .eq('id', 1);
      setStatus("Matchs actualisés depuis les APIs.");
    }catch(err){
      matchesData = cache ? cache.data : [];
      setStatus("Impossible d'actualiser (quota API ?), affichage du cache. " + err.message, true);
    }
  }
  await settlePendingBets();
  renderTab();
}

// Combine les scores (large couverture : CDM, ligues nationales, etc.)
// et les cotes (Football Prediction API, couverture plus étroite) quand elles existent
async function buildMatchesWithOddsAndScores(){
  const [predictions, scores] = await Promise.all([
    fetchPredictions().catch(() => []), // si l'API de cotes échoue, on continue quand même
    fetchScores()
  ]);

  return scores.map(s => {
    const matchedPrediction = findMatchingPrediction(s, predictions);
    const classic = matchedPrediction &&
      matchedPrediction.prediction_per_market &&
      matchedPrediction.prediction_per_market.classic;
    const oddsRaw = classic && classic.odds ? classic.odds : {};
    const probs = classic && classic.probabilities ? classic.probabilities : {};

    const odds = {
      home: oddsRaw['1'] || (probs['1'] ? +(1/probs['1']).toFixed(2) : FALLBACK_ODDS.home),
      draw: oddsRaw['X'] || (probs['X'] ? +(1/probs['X']).toFixed(2) : FALLBACK_ODDS.draw),
      away: oddsRaw['2'] || (probs['2'] ? +(1/probs['2']).toFixed(2) : FALLBACK_ODDS.away)
    };

    return {
      prediction_id: String(s.id), // toujours en texte pour éviter les soucis de type (ex: "fd_537383")
      home_team: s.homeName,
      away_team: s.awayName,
      competition: matchedPrediction ? matchedPrediction.competition_name : '',
      start_date: s.dateISO,
      odds,
      status: s.statusShort,
      home_goals: s.homeGoals,
      away_goals: s.awayGoals,
      has_real_odds: !!matchedPrediction
    };
  });
}

// Cherche une cote correspondante pour un match donné (par nom d'équipe + date)
function findMatchingPrediction(scoreMatch, predictions){
  const sHome = normalizeTeam(scoreMatch.homeName);
  const sAway = normalizeTeam(scoreMatch.awayName);
  const sDate = scoreMatch.dateISO.slice(0,10);

  return predictions.find(p => {
    const pHome = normalizeTeam(p.home_team);
    const pAway = normalizeTeam(p.away_team);
    const pDate = (p.start_date || "").slice(0,10);
    const nameMatch =
      (pHome.includes(sHome) || sHome.includes(pHome)) &&
      (pAway.includes(sAway) || sAway.includes(pAway));
    return nameMatch && pDate === sDate;
  }) || null;
}

async function fetchPredictions(){
  const res = await fetch(
    "https://football-prediction-api.p.rapidapi.com/api/v2/predictions?market=classic",
    {
      headers: {
        "x-rapidapi-key": RAPIDAPI_KEY,
        "x-rapidapi-host": PREDICTIONS_HOST
      }
    }
  );
  if(!res.ok) throw new Error("Erreur API cotes (" + res.status + ")");
  const json = await res.json();
  return json.data || [];
}

async function fetchScores(){
  const [freeApiResult, footballDataResult] = await Promise.allSettled([
    fetchScoresFreeApi(),
    fetchScoresFootballData()
  ]);

  const freeApiMatches = freeApiResult.status === 'fulfilled' ? freeApiResult.value : [];
  const footballDataMatches = footballDataResult.status === 'fulfilled' ? footballDataResult.value : [];

  if(freeApiResult.status === 'rejected'){
    console.warn("free-api-live-football-data indisponible :", freeApiResult.reason);
  }
  if(footballDataResult.status === 'rejected'){
    console.warn("football-data.org (proxy) indisponible :", footballDataResult.reason);
  }

  // Fusionne en évitant les doublons (même équipes + même date dans les deux sources)
  const merged = [...footballDataMatches]; // priorité à football-data.org (plus fiable pour les grandes compets)
  for(const m of freeApiMatches){
    const isDuplicate = merged.some(existing =>
      normalizeTeam(existing.homeName) === normalizeTeam(m.homeName) &&
      normalizeTeam(existing.awayName) === normalizeTeam(m.awayName) &&
      existing.dateISO.slice(0,10) === m.dateISO.slice(0,10)
    );
    if(!isDuplicate) merged.push(m);
  }
  return merged;
}

async function fetchScoresFreeApi(){
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const dateParam = `${yyyy}${mm}${dd}`; // format attendu : YYYYMMDD

  const res = await fetch(
    `https://free-api-live-football-data.p.rapidapi.com/football-get-matches-by-date?date=${dateParam}`,
    {
      headers: {
        "x-rapidapi-key": RAPIDAPI_KEY,
        "x-rapidapi-host": "free-api-live-football-data.p.rapidapi.com"
      }
    }
  );
  if(!res.ok) throw new Error("Erreur API scores free-api (" + res.status + ")");
  const json = await res.json();
  const rawMatches = (json.response && json.response.matches) || [];
  return rawMatches.map(normalizeScoreMatch);
}

// Passe par la Edge Function Supabase (football-proxy) pour éviter le CORS
// et garder la clé football-data.org cachée côté serveur
async function fetchScoresFootballData(){
  const now = new Date();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  const dateFrom = yesterday.toISOString().slice(0,10);
  const dateTo = tomorrow.toISOString().slice(0,10);

  const res = await fetch(
    `${SUPABASE_URL}/functions/v1/football-proxy?dateFrom=${dateFrom}&dateTo=${dateTo}`,
    {
      headers: {
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "apikey": SUPABASE_ANON_KEY
      }
    }
  );
  if(!res.ok) throw new Error("Erreur proxy football-data.org (" + res.status + ")");
  const json = await res.json();
  const rawMatches = json.matches || [];
  return rawMatches.map(normalizeFootballDataMatch);
}

// Convertit un match football-data.org vers le même format interne
function normalizeFootballDataMatch(m){
  const statusMap = {
    SCHEDULED: 'NS', TIMED: 'NS',
    LIVE: 'LIVE', IN_PLAY: 'LIVE', PAUSED: 'LIVE',
    FINISHED: 'FT', AWARDED: 'FT',
    POSTPONED: 'PP', SUSPENDED: 'PP', CANCELLED: 'PP'
  };
  return {
    id: 'fd_' + m.id, // préfixe pour éviter toute collision d'id avec l'autre source
    dateISO: m.utcDate,
    homeName: m.homeTeam.name,
    awayName: m.awayTeam.name,
    homeGoals: m.score.fullTime.home,
    awayGoals: m.score.fullTime.away,
    statusShort: statusMap[m.status] || 'NS'
  };
}

// Convertit un match de free-api-live-football-data vers un format interne commun
function normalizeScoreMatch(m){
  let statusShort = 'NS';
  if(m.status.cancelled){
    statusShort = 'PP';
  } else if(m.status.finished){
    statusShort = (m.status.reason && m.status.reason.short || 'FT').toUpperCase();
  } else if(m.status.started){
    statusShort = 'LIVE';
  }

  return {
    id: m.id,
    dateISO: new Date(m.timeTS).toISOString(),
    homeName: m.home.longName || m.home.name,
    awayName: m.away.longName || m.away.name,
    homeGoals: m.home.score,
    awayGoals: m.away.score,
    statusShort
  };
}

// Recoupe une prédiction (nom d'équipes + date) avec un match de l'API de scores
function normalizeTeam(name){
  return (name || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // enlève les accents
    .replace(/[^a-z0-9]/g, "");
}

// ==============================
// RENDER: PARIER
// ==============================
function renderMatches(){
  const el = document.getElementById('content');
  if(matchesData.length === 0){
    el.innerHTML = `<div class="empty">Aucun match disponible pour le moment.</div>`;
    return;
  }
  el.innerHTML = matchesData.map(m => matchCard(m)).join('');
}

function matchCard(m){
  const status = m.status; // NS, LIVE, FT, AET, PEN, PP
  const isLive = status === 'LIVE';
  const isFinished = status === 'FT' || status === 'AET' || status === 'PEN';
  const kickoff = new Date(m.start_date).toLocaleString('fr-FR', {weekday:'short', hour:'2-digit', minute:'2-digit'});

  let scoreBlock;
  if(isLive){
    scoreBlock = `<div class="score">${m.home_goals ?? 0} - ${m.away_goals ?? 0}</div><div class="minute">En direct</div>`;
  } else if(isFinished){
    scoreBlock = `<div class="score">${m.home_goals ?? 0} - ${m.away_goals ?? 0}</div><div class="kickoff">Terminé</div>`;
  } else {
    scoreBlock = `<div class="score">VS</div><div class="kickoff">${kickoff}</div>`;
  }

  const canBet = !isFinished; // on peut parier tant que le match n'est pas fini
  const pid = m.prediction_id;

  return `
    <div class="match">
      <div class="match-top">
        <div class="team">${m.home_team}</div>
        <div class="score-block">${scoreBlock}</div>
        <div class="team right">${m.away_team}</div>
      </div>
      <div class="league">${m.competition || ''}</div>
      ${canBet ? betForm(pid, m.home_team, m.away_team, m.odds, m.has_real_odds) : `<div class="odds-tag" style="margin-top:10px;">Paris fermés</div>`}
    </div>
  `;
}

function betForm(predictionId, homeName, awayName, odds, hasRealOdds){
  const oddsNote = hasRealOdds ? '' : `<span class="odds-tag">(cotes estimées)</span>`;
  return `
    <div class="bet-form">
      <select id="pred_${predictionId}">
        <option value="home">Victoire ${homeName} (x${odds.home})</option>
        <option value="draw">Match nul (x${odds.draw})</option>
        <option value="away">Victoire ${awayName} (x${odds.away})</option>
      </select>
      <input type="number" id="stake_${predictionId}" placeholder="Mise" min="1">
      <button onclick="placeBet('${predictionId}', '${escapeQ(homeName)}', '${escapeQ(awayName)}')">Parier</button>
      ${oddsNote}
    </div>
  `;
}

function escapeQ(s){ return s.replace(/'/g, "\\'"); }

async function placeBet(predictionId, homeName, awayName){
  const pred = document.getElementById(`pred_${predictionId}`).value;
  const stake = parseInt(document.getElementById(`stake_${predictionId}`).value, 10);

  if(!stake || stake <= 0){
    setStatus("Entre une mise valide.", true);
    return;
  }

  const match = matchesData.find(m => m.prediction_id === predictionId);
  const odds = match.odds[pred];

  const { data, error } = await sb.rpc('place_bet', {
    p_fixture_id: predictionId,
    p_home_team: homeName,
    p_away_team: awayName,
    p_prediction: pred,
    p_predicted_score: null,
    p_stake: stake,
    p_odds: odds
  });

  if(error){
    setStatus("Erreur : " + error.message, true);
    return;
  }
  setStatus("Pari enregistré !");
  await refreshBalance();
}

// ==============================
// RENDER: MES PARIS
// ==============================
async function renderMyBets(){
  const el = document.getElementById('content');
  el.innerHTML = `<div class="empty">Chargement…</div>`;
  const { data, error } = await sb
    .from('bets')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  if(error || !data || data.length === 0){
    el.innerHTML = `<div class="empty">Tu n'as encore parié sur aucun match.</div>`;
    return;
  }

  el.innerHTML = `
    <table>
      <thead><tr><th>Match</th><th>Pari</th><th>Mise</th><th>Statut</th><th>Gain</th></tr></thead>
      <tbody>
        ${data.map(b => `
          <tr>
            <td>${b.home_team} - ${b.away_team}</td>
            <td>${predLabel(b)}</td>
            <td>${b.stake} <span class="material-symbols-outlined"></span></td>
            <td class="status-${b.status}">${statusLabel(b.status)}</td>
            <td>${b.status === 'won' ? '+' + b.payout : (b.status === 'lost' ? '-' + b.stake : '—')}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function predLabel(b){
  if(b.prediction === 'home') return b.home_team + ' gagne';
  if(b.prediction === 'away') return b.away_team + ' gagne';
  if(b.prediction === 'draw') return 'Match nul';
  if(b.prediction === 'score') return 'Score exact ' + b.predicted_score;
  return b.prediction;
}
function statusLabel(s){
  return { pending: 'En attente', won: 'Gagné', lost: 'Perdu', void: 'Annulé' }[s] || s;
}

// ==============================
// RENDER: CLASSEMENT
// ==============================
async function renderLeaderboard(){
  const el = document.getElementById('content');
  el.innerHTML = `<div class="empty">Chargement…</div>`;
  const { data, error } = await sb
    .from('profiles')
    .select('id, username, balance')
    .order('balance', { ascending: false })
    .limit(50);

  if(error || !data){
    el.innerHTML = `<div class="empty">Impossible de charger le classement.</div>`;
    return;
  }

  el.innerHTML = data.map((p, i) => `
    <div class="rank">
      <div><span class="pos">#${i+1}</span> ${p.username || p.id.slice(0,8)}</div>
      <div style="color:var(--flood);font-weight:700;">${p.balance} <span class="material-symbols-outlined" style="color:var(--flood);"></span></div>
    </div>
  `).join('');
}

// ==============================
// RÉSOLUTION AUTOMATIQUE DES PARIS TERMINÉS
// ==============================
async function settlePendingBets(){
  const { data: pending } = await sb
    .from('bets')
    .select('*')
    .eq('status', 'pending');

  if(!pending || pending.length === 0) return;

  for(const bet of pending){
    // bet.fixture_id contient en réalité le prediction_id (voir placeBet)
    const match = matchesData.find(m => m.prediction_id === bet.fixture_id);
    if(!match) continue;
    if(match.status === 'FT' || match.status === 'AET' || match.status === 'PEN'){
      await sb.rpc('settle_bet', {
        p_bet_id: bet.id,
        p_home_score: match.home_goals ?? 0,
        p_away_score: match.away_goals ?? 0
      });
    }
  }
  await refreshBalance();
}

// ==============================
function setStatus(msg, isError=false){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? "#ff8a8a" : "";
}

init();

   async function refreshBalance(){
  const { data, error } = await sb
    .from('profiles')
    .select('balance')
    .eq('id', currentUser.id)
    .single();
  if(!error && data){
    document.getElementById('balanceAmount').innerHTML = data.balance + ' <span class="material-symbols-outlined">money_bag</span>';
  }
}
