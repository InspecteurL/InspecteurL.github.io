<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forum – HorizonCiné</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3d;
      --accent: #e8b84b;
      --accent2: #c0392b;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    nav {
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 60px;
    }
    .nav-logo { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; text-decoration: none; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 600; letter-spacing: 0.5px; transition: color 0.2s; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent); }

    .layout {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.5rem;
    }
    @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }

    /* HEADER FORUM */
    .forum-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .forum-title { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 3px; }
    .forum-title span { color: var(--accent); }

    /* CATEGORIES */
    .categories {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .cat-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .cat-btn:hover, .cat-btn.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }

    /* NEW THREAD */
    .new-thread-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1.25rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .mini-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8b84b, #c0392b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', cursive;
      font-size: 1rem;
      color: #0a0a0f;
      flex-shrink: 0;
    }
    .new-thread-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s;
    }
    .new-thread-input:hover { border-color: var(--accent); color: var(--text); }

    /* THREAD LIST */
    .thread-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .thread-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      gap: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .thread-card:hover { border-color: var(--accent); transform: translateX(3px); }

    .vote-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      min-width: 36px;
    }
    .vote-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
      padding: 0;
    }
    .vote-btn:hover { color: var(--accent); }
    .vote-btn.upvoted { color: var(--accent); }
    .vote-count { font-family: 'Bebas Neue', cursive; font-size: 0.9rem; color: var(--text); }

    .thread-body { flex: 1; min-width: 0; }
    .thread-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
    .thread-tag {
      background: rgba(232,184,75,0.15);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .thread-author { font-size: 0.75rem; color: var(--muted); }
    .thread-time { font-size: 0.75rem; color: var(--muted); }
    .thread-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.35rem; line-height: 1.3; }
    .thread-preview { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-footer { display: flex; gap: 1rem; margin-top: 0.6rem; }
    .thread-stat { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 0.3rem; }

    /* SIDEBAR */
    .sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .sidebar-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .sidebar-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    .trending-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .trending-item { display: flex; align-items: center; gap: 0.75rem; }
    .trending-num { font-family: 'Bebas Neue', cursive; font-size: 1.2rem; color: var(--border); min-width: 20px; }
    .trending-title { font-size: 0.8rem; font-weight: 600; }
    .trending-count { font-size: 0.7rem; color: var(--muted); }

    .rules-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .rules-list li { font-size: 0.8rem; color: var(--muted); display: flex; gap: 0.5rem; }
    .rules-list li::before { content: '—'; color: var(--accent); flex-shrink: 0; }

    /* MODAL THREAD */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      margin: auto;
    }
    .modal h3 { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select option { background: var(--card); }
    .modal-btns { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 1.2rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; }
    .btn-post { background: var(--accent); border: none; color: #0a0a0f; padding: 0.5rem 1.5rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-post:hover { background: #f0c85a; }

    /* THREAD DETAIL */
    .thread-detail { display: none; }
    .thread-detail.open { display: block; }
    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0;
    }
    .back-btn:hover { color: var(--text); }
    .detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .detail-title { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 1px; margin: 0.75rem 0; }
    .detail-body { font-size: 0.9rem; line-height: 1.7; color: #c0c0d8; }

    .comments-section { margin-top: 1.5rem; }
    .comments-title { font-family: 'Bebas Neue', cursive; font-size: 1.2rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 1rem; }
    .comment-input-wrap {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .comment-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
    }
    .comment-input:focus { border-color: var(--accent); }
    .btn-comment {
      background: var(--accent);
      border: none;
      color: #0a0a0f;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }
    .comment-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .comment-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }
    .comment-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.4rem; }
    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', cursive;
      font-size: 0.8rem;
      color: #0a0a0f;
    }
    .comment-user { font-size: 0.8rem; font-weight: 600; }
    .comment-time { font-size: 0.72rem; color: var(--muted); margin-left: auto; }
    .comment-text { font-size: 0.85rem; color: #c0c0d8; line-height: 1.5; }

    .btn-new-thread {
      background: var(--accent);
      border: none;
      color: #0a0a0f;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-new-thread:hover { background: #f0c85a; }
  </style>
</head>
<body>

<nav>
  <a href="accueil.html" class="nav-logo">HorizonCiné</a>
  <a href="accueil.html">Accueil</a>
  <a href="amis.html">Trouver</a>
  <a href="mes-amis.html">Amis</a>
  <a href="forum.html" class="active">Forum</a>
  <a href="profil.html">Profil</a>
</nav>

<div class="layout">
  <!-- MAIN -->
  <main>
    <!-- LISTE DES FILS -->
    <div id="view-list">
      <div class="forum-header">
        <div class="forum-title">Forum <span>Ciné</span></div>
        <button class="btn-new-thread" onclick="openNewThread()">+ Nouveau fil</button>
      </div>

      <div class="categories">
        <button class="cat-btn active" onclick="filterCat('tous', this)">Tous</button>
        <button class="cat-btn" onclick="filterCat('Films', this)">🎬 Films</button>
        <button class="cat-btn" onclick="filterCat('Séries', this)">📺 Séries</button>
        <button class="cat-btn" onclick="filterCat('Animes', this)">🌸 Animes</button>
        <button class="cat-btn" onclick="filterCat('Débat', this)">🔥 Débats</button>
      </div>

      <div class="new-thread-box">
        <div class="mini-avatar">M</div>
        <button class="new-thread-input" onclick="openNewThread()">Démarrer un fil de discussion…</button>
      </div>

      <div class="thread-list" id="threadList"></div>
    </div>

    <!-- DÉTAIL D'UN FIL -->
    <div id="view-detail" class="thread-detail">
      <button class="back-btn" onclick="goBack()">← Retour au forum</button>
      <div class="detail-card" id="detailContent"></div>
      <div class="comments-section">
        <div class="comments-title">Commentaires</div>
        <div class="comment-input-wrap">
          <input class="comment-input" id="commentInput" placeholder="Ajouter un commentaire…" onkeydown="handleCommentKey(event)"/>
          <button class="btn-comment" onclick="addComment()">Envoyer</button>
        </div>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">🔥 Tendances</div>
      <div class="trending-list" id="trendingList"></div>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-title">📋 Règles</div>
      <ul class="rules-list">
        <li>Respecte les spoilers</li>
        <li>Pas d'insultes</li>
        <li>Sources si possible</li>
        <li>Reste dans le sujet</li>
        <li>Amuse-toi bien 🎬</li>
      </ul>
    </div>
  </aside>
</div>

<!-- MODAL NOUVEAU FIL -->
<div class="modal-overlay" id="newThreadModal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3>Nouveau fil de discussion</h3>
    <div class="form-group">
      <label>Catégorie</label>
      <select id="newCat">
        <option value="Films">🎬 Films</option>
        <option value="Séries">📺 Séries</option>
        <option value="Animes">🌸 Animes</option>
        <option value="Débat">🔥 Débat</option>
      </select>
    </div>
    <div class="form-group">
      <label>Titre du fil</label>
      <input type="text" id="newTitle" placeholder="Ex : Meilleur film de tous les temps ?"/>
    </div>
    <div class="form-group">
      <label>Contenu</label>
      <textarea id="newBody" placeholder="Développe ta question ou ton avis…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-post" onclick="postThread()">Publier</button>
    </div>
  </div>
</div>

<script>
  const COLORS = ['#e8b84b','#3498db','#e74c3c','#2ecc71','#9b59b6','#1abc9c'];
  const avatarColors = {};
  function getColor(name) {
    if (!avatarColors[name]) avatarColors[name] = COLORS[Object.keys(avatarColors).length % COLORS.length];
    return avatarColors[name];
  }

  let threads = [
    { id:1, cat:'Débat', author:'Sofia', time:'Il y a 2h', title:'Quel est le GOAT des films de SF selon vous ?', body:'Difficile de choisir entre Interstellar, 2001 ou Blade Runner. Donnez votre avis ! Interstellar reste mon éternel favori pour la bande son de Zimmer seule.', votes:42, comments:[], commentCount:14 },
    { id:2, cat:'Séries', author:'Kevin', time:'Il y a 4h', title:'Arcane saison 2 — vos impressions honnêtes', body:'Après une saison 1 parfaite, la saison 2 était-elle à la hauteur ? J\'ai trouvé quelques longueurs mais les derniers épisodes m\'ont scotché au canapé.', votes:38, comments:[], commentCount:21 },
    { id:3, cat:'Animes', author:'Léa', time:'Il y a 6h', title:'Steins;Gate — meilleur anime de tous les temps ?', body:'Je viens de finir Steins;Gate pour la première fois. 9.07 de note, et franchement c\'est mérité. L\'histoire dans les derniers épisodes m\'a brisé le coeur.', votes:55, comments:[], commentCount:9 },
    { id:4, cat:'Films', author:'Tom', time:'Hier', title:'Gladiator II — déception ou bonne surprise ?', body:'Ridley Scott revient avec une suite 24 ans après. Le casting est solide mais est-ce que ça dépasse l\'original ? Mon avis : non, mais c\'est tout de même un bon film.', votes:27, comments:[], commentCount:33 },
    { id:5, cat:'Débat', author:'Marie', time:'Il y a 2j', title:'Meilleur film français des 20 dernières années ?', body:'Entre Intouchables, Bienvenue chez les Ch\'tis, Parasite (coréen je sais)... qu\'est ce que vous mettez numéro 1 côté cinéma français ?', votes:19, comments:[], commentCount:17 },
  ];

  let currentFilter = 'tous';
  let activeThread = null;

  function renderThreads() {
    const list = document.getElementById('threadList');
    const filtered = currentFilter === 'tous' ? threads : threads.filter(t => t.cat === currentFilter);
    list.innerHTML = filtered.map(t => `
      <div class="thread-card" onclick="openThread(${t.id})">
        <div class="vote-col">
          <button class="vote-btn" onclick="vote(event,${t.id},1)">▲</button>
          <div class="vote-count" id="votes-${t.id}">${t.votes}</div>
          <button class="vote-btn" onclick="vote(event,${t.id},-1)">▼</button>
        </div>
        <div class="thread-body">
          <div class="thread-meta">
            <span class="thread-tag">${t.cat}</span>
            <span class="thread-author">par ${t.author}</span>
            <span class="thread-time">· ${t.time}</span>
          </div>
          <div class="thread-title">${t.title}</div>
          <div class="thread-preview">${t.body}</div>
          <div class="thread-footer">
            <span class="thread-stat">💬 ${t.commentCount + t.comments.length} commentaires</span>
            <span class="thread-stat">🔗 Partager</span>
          </div>
        </div>
      </div>
    `).join('');
    renderTrending();
  }

  function renderTrending() {
    const sorted = [...threads].sort((a,b) => b.votes - a.votes).slice(0,4);
    document.getElementById('trendingList').innerHTML = sorted.map((t,i) => `
      <div class="trending-item">
        <div class="trending-num">${i+1}</div>
        <div>
          <div class="trending-title">${t.title.substring(0,40)}…</div>
          <div class="trending-count">${t.votes} votes · ${t.commentCount + t.comments.length} comms</div>
        </div>
      </div>
    `).join('');
  }

  function vote(e, id, dir) {
    e.stopPropagation();
    const t = threads.find(t => t.id === id);
    if (t) { t.votes += dir; renderThreads(); }
  }

  function filterCat(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderThreads();
  }

  function openThread(id) {
    activeThread = threads.find(t => t.id === id);
    if (!activeThread) return;
    document.getElementById('view-list').style.display = 'none';
    document.getElementById('view-detail').classList.add('open');
    renderDetail();
  }

  function renderDetail() {
    const t = activeThread;
    document.getElementById('detailContent').innerHTML = `
      <div class="thread-meta" style="margin-bottom:0.5rem">
        <span class="thread-tag">${t.cat}</span>
        <span class="thread-author">par ${t.author}</span>
        <span class="thread-time">· ${t.time}</span>
      </div>
      <div class="detail-title">${t.title}</div>
      <div class="detail-body">${t.body}</div>
      <div class="thread-footer" style="margin-top:1rem">
        <button class="vote-btn" onclick="vote2(1)" style="color:var(--muted);font-size:1.1rem;background:none;border:none;cursor:pointer">▲</button>
        <span style="font-family:'Bebas Neue';font-size:1.1rem;color:var(--accent)" id="detail-votes">${t.votes}</span>
        <button class="vote-btn" onclick="vote2(-1)" style="color:var(--muted);font-size:1.1rem;background:none;border:none;cursor:pointer">▼</button>
      </div>
    `;
    renderComments();
  }

  function vote2(dir) {
    activeThread.votes += dir;
    document.getElementById('detail-votes').textContent = activeThread.votes;
    renderThreads();
  }

  function renderComments() {
    const allComments = [
      ...activeThread.comments
    ];
    // add some seed comments for existing threads
    const seeds = {
      1: [{user:'Kevin',text:'Interstellar sans hésiter, la scène des robots m\'a trop marqué.',color:'#3498db'},{user:'Léa',text:'2001 reste indépassable pour moi, Kubrick c\'est du génie.',color:'#e74c3c'}],
      2: [{user:'Marc',text:'La saison 2 avait trop de personnages à gérer, mais visuellement c\'est dingue.',color:'#e8b84b'}],
      3: [{user:'Tom',text:'Stins;Gate m\'a traumatisé dans le bon sens, les boucles temporelles sont incroyables.',color:'#9b59b6'}],
      4: [{user:'Sofia',text:'Pas mieux que l\'original mais Paul Mescal assure vraiment.',color:'#e8b84b'}],
    };
    const seeded = seeds[activeThread.id] || [];
    const combined = [...seeded, ...allComments];
    document.getElementById('commentList').innerHTML = combined.map(c => `
      <div class="comment-item">
        <div class="comment-header">
          <div class="comment-avatar" style="background:${c.color || getColor(c.user)}">${c.user[0]}</div>
          <div class="comment-user">${c.user}</div>
          <div class="comment-time">${c.time || 'Il y a quelques secondes'}</div>
        </div>
        <div class="comment-text">${c.text}</div>
      </div>
    `).join('') || '<div style="color:var(--muted);font-size:0.85rem">Aucun commentaire. Soyez le premier !</div>';
  }

  function addComment() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text || !activeThread) return;
    activeThread.comments.push({ user: 'Marc', text, color: '#e8b84b' });
    input.value = '';
    renderComments();
    renderThreads();
  }
  function handleCommentKey(e) { if (e.key === 'Enter') addComment(); }

  function goBack() {
    document.getElementById('view-list').style.display = '';
    document.getElementById('view-detail').classList.remove('open');
    activeThread = null;
  }

  // MODAL
  function openNewThread() { document.getElementById('newThreadModal').classList.add('open'); }
  function closeModal() { document.getElementById('newThreadModal').classList.remove('open'); }
  function closeModalOutside(e) { if (e.target.id === 'newThreadModal') closeModal(); }

  function postThread() {
    const title = document.getElementById('newTitle').value.trim();
    const body = document.getElementById('newBody').value.trim();
    const cat = document.getElementById('newCat').value;
    if (!title) return;
    threads.unshift({ id: Date.now(), cat, author: 'Marc', time: 'À l\'instant', title, body: body || '', votes: 1, comments: [], commentCount: 0 });
    closeModal();
    document.getElementById('newTitle').value = '';
    document.getElementById('newBody').value = '';
    renderThreads();
  }

  renderThreads();
</script>
</body>
</html>
