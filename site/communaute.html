<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Communauté – HorizonCiné</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3d;
      --accent: #e8b84b;
      --accent2: #c0392b;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    nav {
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 60px;
    }
    .nav-logo { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; text-decoration: none; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 600; letter-spacing: 0.5px; transition: color 0.2s; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent); }

    .page-wrapper { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    .page-title { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 3px; margin-bottom: 0.25rem; }
    .page-title span { color: var(--accent); }
    .page-sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }

    /* SEARCH */
    .search-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
    }
    .search-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* USER GRID */
    .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }

    .user-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, transform 0.15s;
    }
    .user-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .user-card-header { display: flex; align-items: center; gap: 0.85rem; }
    .user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.3rem;
      color: #0a0a0f;
      flex-shrink: 0;
      position: relative;
    }
    .online-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 11px;
      height: 11px;
      background: #2ecc71;
      border-radius: 50%;
      border: 2px solid var(--card);
    }
    .user-info .user-name { font-weight: 600; font-size: 0.95rem; }
    .user-info .user-handle { color: var(--accent); font-size: 0.75rem; }
    .user-bio { font-size: 0.8rem; color: var(--muted); font-style: italic; line-height: 1.4; }

    .user-stats { display: flex; gap: 1.5rem; }
    .ustat { text-align: center; }
    .ustat-num { font-family: 'Bebas Neue', cursive; font-size: 1.2rem; color: var(--text); line-height: 1; }
    .ustat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .user-fav-films { display: flex; gap: 0.35rem; }
    .fav-thumb {
      width: 36px;
      height: 54px;
      border-radius: 4px;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .fav-thumb:hover { opacity: 1; }

    .btn-follow {
      background: var(--accent);
      border: none;
      color: #0a0a0f;
      padding: 0.45rem 1rem;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    .btn-follow:hover { background: #f0c85a; }
    .btn-follow.following {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-follow.pending {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* REQUESTS */
    .request-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .request-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .request-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.1rem;
      color: #0a0a0f;
      flex-shrink: 0;
    }
    .request-info { flex: 1; }
    .request-name { font-weight: 600; font-size: 0.9rem; }
    .request-sub { color: var(--muted); font-size: 0.75rem; }
    .request-btns { display: flex; gap: 0.5rem; }
    .btn-accept {
      background: #2ecc71;
      border: none;
      color: #0a0a0f;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-decline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-decline:hover { border-color: var(--accent2); color: var(--accent2); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; }

    /* NOTIFICATION BADGE */
    .tab-badge {
      background: var(--accent2);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 0.4rem;
    }
  </style>
</head>
<body>

<nav>
  <a href="accueil.html" class="nav-logo">HorizonCiné</a>
  <a href="accueil.html">Accueil</a>
  <a href="communaute.html" class="active">Communauté</a>
  <a href="mes-amis.html">Mes Amis</a>
  <a href="forum.html">Forum</a>
  <a href="profil.html">Profil</a>
</nav>

<div class="page-wrapper">
  <div class="page-title">Communauté <span>Ciné</span></div>
  <div class="page-sub">Retrouve des passionnés, suis leurs recommendations, partage tes coups de cœur.</div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Rechercher un utilisateur…" oninput="filterUsers()"/>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('discover', this)">Découvrir</button>
    <button class="tab-btn" onclick="switchTab('following', this)">Abonnements</button>
    <button class="tab-btn" onclick="switchTab('followers', this)">Abonnés</button>
    <button class="tab-btn" onclick="switchTab('requests', this)">Demandes <span class="tab-badge">2</span></button>
  </div>

  <!-- DISCOVER -->
  <div class="tab-pane active" id="tab-discover">
    <div class="user-grid" id="discoverGrid"></div>
  </div>

  <!-- FOLLOWING -->
  <div class="tab-pane" id="tab-following">
    <div class="user-grid" id="followingGrid"></div>
  </div>

  <!-- FOLLOWERS -->
  <div class="tab-pane" id="tab-followers">
    <div class="user-grid" id="followersGrid"></div>
  </div>

  <!-- REQUESTS -->
  <div class="tab-pane" id="tab-requests">
    <div class="request-list" id="requestList">
      <div class="request-item">
        <div class="request-avatar" style="background:linear-gradient(135deg,#9b59b6,#8e44ad)">A</div>
        <div class="request-info">
          <div class="request-name">Alex</div>
          <div class="request-sub">@alex_marvel · Fan de Marvel et DC</div>
        </div>
        <div class="request-btns">
          <button class="btn-accept" onclick="acceptRequest(this, 'Alex')">✓ Accepter</button>
          <button class="btn-decline" onclick="declineRequest(this)">✗</button>
        </div>
      </div>
      <div class="request-item">
        <div class="request-avatar" style="background:linear-gradient(135deg,#1abc9c,#16a085)">C</div>
        <div class="request-info">
          <div class="request-name">Camille</div>
          <div class="request-sub">@camille_cine · Cinéphile classique</div>
        </div>
        <div class="request-btns">
          <button class="btn-accept" onclick="acceptRequest(this, 'Camille')">✓ Accepter</button>
          <button class="btn-decline" onclick="declineRequest(this)">✗</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const FILMS = [
    'https://media.themoviedb.org/t/p/w440_and_h660_face/wnDNKCeBQzioXYQrXcSyrmRHVxf.jpg',
    'https://media.themoviedb.org/t/p/w440_and_h660_face/3fDI4D5rWefyUs7kLcvyafwBEmZ.jpg',
    'https://media.themoviedb.org/t/p/w440_and_h660_face/wF7jv3x51hXgkl7t5KHePuRjXc8.jpg',
    'https://media.themoviedb.org/t/p/w440_and_h660_face/7hLSzZX2jROmEXz2aEoh6JKUFy2.jpg',
    'https://media.themoviedb.org/t/p/w440_and_h660_face/amopQYesMdw4wtMMUhsUtvMUyT6.jpg',
  ];

  const users = [
    { id:1, name:'Sofia', handle:'@sofia_series', bio:'Passionnée d\'animations et de sci-fi. Arcane m\'a changé la vie.', films:47, followers:312, color:'linear-gradient(135deg,#e8b84b,#f39c12)', online:true, following:false, films_img:[0,1,2] },
    { id:2, name:'Kevin', handle:'@kevin_films', bio:'J\'ai vu plus de 200 films. Spécialiste des thrillers et films noirs.', films:89, followers:198, color:'linear-gradient(135deg,#3498db,#2980b9)', online:true, following:true, films_img:[3,4,0] },
    { id:3, name:'Léa', handle:'@lea_anime', bio:'Otaku depuis 2015. Death Note et Steins;Gate ont changé ma vie.', films:134, followers:445, color:'linear-gradient(135deg,#e74c3c,#c0392b)', online:false, following:false, films_img:[1,2,4] },
    { id:4, name:'Tom', handle:'@tom_action', bio:'Fan de Nolan, Villeneuve et Fincher. Les chefs-d\'oeuvre d\'abord.', films:61, followers:87, color:'linear-gradient(135deg,#2ecc71,#27ae60)', online:true, following:true, films_img:[0,3,1] },
    { id:5, name:'Marie', handle:'@marie_drama', bio:'Le cinéma français et les drames historiques sont ma passion.', films:203, followers:521, color:'linear-gradient(135deg,#9b59b6,#8e44ad)', online:false, following:false, films_img:[2,4,3] },
    { id:6, name:'Julien', handle:'@julien_horror', bio:'Horreur, gore et films de genre. On n\'est pas tous les mêmes.', films:77, followers:143, color:'linear-gradient(135deg,#e67e22,#d35400)', online:true, following:false, films_img:[1,0,2] },
  ];

  function userCardHTML(u) {
    return `
      <div class="user-card" id="card-${u.id}">
        <div class="user-card-header">
          <div class="user-avatar" style="background:${u.color}">
            ${u.name[0]}
            ${u.online ? '<div class="online-dot"></div>' : ''}
          </div>
          <div class="user-info">
            <div class="user-name">${u.name}</div>
            <div class="user-handle">${u.handle}</div>
          </div>
        </div>
        <div class="user-bio">${u.bio}</div>
        <div class="user-stats">
          <div class="ustat"><div class="ustat-num">${u.films}</div><div class="ustat-label">Films</div></div>
          <div class="ustat"><div class="ustat-num">${u.followers}</div><div class="ustat-label">Abonnés</div></div>
        </div>
        <div class="user-fav-films">
          ${u.films_img.map(i => `<img class="fav-thumb" src="${FILMS[i]}" alt="film"/>`).join('')}
        </div>
        <button class="btn-follow ${u.following ? 'following' : ''}" id="follow-${u.id}" onclick="toggleFollow(${u.id})">
          ${u.following ? '✓ Abonné' : '+ Suivre'}
        </button>
      </div>
    `;
  }

  function renderDiscover(filter = '') {
    const filtered = users.filter(u =>
      u.name.toLowerCase().includes(filter.toLowerCase()) ||
      u.handle.toLowerCase().includes(filter.toLowerCase())
    );
    document.getElementById('discoverGrid').innerHTML = filtered.length
      ? filtered.map(userCardHTML).join('')
      : `<div class="empty-state"><div class="empty-icon">🔍</div><p>Aucun utilisateur trouvé.</p></div>`;
  }

  function renderFollowing() {
    const f = users.filter(u => u.following);
    document.getElementById('followingGrid').innerHTML = f.length
      ? f.map(userCardHTML).join('')
      : `<div class="empty-state"><div class="empty-icon">🎬</div><p>Tu ne suis personne encore. Explore la communauté !</p></div>`;
  }

  function renderFollowers() {
    const f = users.filter(u => u.id <= 3);
    document.getElementById('followersGrid').innerHTML = f.map(userCardHTML).join('');
  }

  function toggleFollow(id) {
    const u = users.find(u => u.id === id);
    if (!u) return;
    u.following = !u.following;
    u.followers += u.following ? 1 : -1;
    renderDiscover(document.getElementById('searchInput').value);
    renderFollowing();
    renderFollowers();
  }

  function filterUsers() {
    renderDiscover(document.getElementById('searchInput').value);
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function acceptRequest(btn, name) {
    const item = btn.closest('.request-item');
    item.style.opacity = '0';
    item.style.transition = 'opacity 0.3s';
    setTimeout(() => item.remove(), 300);
  }

  function declineRequest(btn) {
    const item = btn.closest('.request-item');
    item.style.opacity = '0';
    item.style.transition = 'opacity 0.3s';
    setTimeout(() => item.remove(), 300);
  }

  renderDiscover();
  renderFollowing();
  renderFollowers();
</script>
</body>
</html>
