<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime-Cards — HorizonCiné</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg-void: #0b0e14;
    --bg-panel: #131826;
    --bg-panel-2: #1a2032;
    --ink: #edeef2;
    --ink-dim: #8a90a3;
    --border: rgba(255,255,255,0.08);

    --c-commune: #8a90a3;
    --c-rare: #4c8ce8;
    --c-epique: #a855f7;
    --c-legendaire: #e8a94c;
    --c-mythique: #ff6fd8;

    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-void);
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  a { color: inherit; }

  /* ---------------- NAV ---------------- */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(11,14,20,0.9);
    backdrop-filter: blur(10px);
    z-index: 20;
  }
  .nav-left { display: flex; align-items: center; gap: 18px; }
  .nav-back {
    font-size: 13px;
    color: var(--ink-dim);
    text-decoration: none;
    letter-spacing: 0.03em;
  }
  .nav-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .nav-balance {
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 0.03em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-panel);
  }
  .nav-balance span { color: var(--c-legendaire); }

  /* ---------------- BANNIÈRES ---------------- */
  .banniere-tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 28px 20px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--ink); border-color: var(--ink-dim); }
  .tab-btn.active {
    color: var(--bg-void);
    background: var(--ink);
    border-color: var(--ink);
  }

  /* ---------------- PACK ZONE ---------------- */
  .pack-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 56px;
    text-align: center;
  }

  .pack-art {
    width: 200px;
    height: 280px;
    border-radius: 12px;
    background: linear-gradient(160deg, var(--bg-panel-2), var(--bg-panel));
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
    box-shadow: 0 0 60px -20px var(--pack-glow, rgba(232,169,76,0.35));
  }
  .pack-art:hover { transform: translateY(-4px); }
  .pack-art::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border: 1px solid var(--pack-glow, rgba(232,169,76,0.6));
    opacity: 0.6;
  }
  .pack-symbol {
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .pack-description {
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--ink-dim);
    max-width: 320px;
  }

  .pity-info {
    margin-top: 16px;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.02em;
  }
  .pity-bar {
    width: 220px;
    height: 3px;
    background: var(--bg-panel-2);
    border-radius: 2px;
    margin: 8px auto 0;
    overflow: hidden;
  }
  .pity-bar-fill {
    height: 100%;
    background: var(--c-legendaire);
    transition: width 0.4s;
  }

  .pull-buttons {
    display: flex;
    gap: 14px;
    margin-top: 28px;
  }
  .pull-btn {
    font-family: var(--font-display);
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 14px 26px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .pull-btn:active { transform: scale(0.97); }
  .pull-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pull-btn.simple { background: var(--bg-panel-2); color: var(--ink); border: 1px solid var(--border); }
  .pull-btn.dix { background: var(--c-legendaire); color: #1a1204; }

  .status-msg {
    margin-top: 16px;
    font-size: 13px;
    color: var(--c-rare);
    min-height: 18px;
  }
  .status-msg.error { color: #f06060; }

  /* ---------------- COLLECTION ---------------- */
  .collection-section {
    padding: 40px 28px 80px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .collection-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .collection-title {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .collection-count { color: var(--ink-dim); font-size: 13px; }

  .filters { display: flex; gap: 8px; }
  .filters select {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 4px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  .card-item {
    aspect-ratio: 3/4.2;
    border-radius: 8px;
    background: var(--bg-panel);
    border: 1px solid var(--rarity-color, var(--border));
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-item.locked { opacity: 0.25; filter: grayscale(1); }
  .card-item img {
    width: 100%;
    height: 65%;
    object-fit: cover;
  }
  .card-item .card-info {
    padding: 8px 10px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card-item .card-nom {
    font-family: var(--font-display);
    font-size: 13px;
    line-height: 1.2;
  }
  .card-item .card-anime {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .card-item .card-qte {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: var(--ink);
    font-size: 11px;
    font-family: var(--font-display);
    padding: 2px 7px;
    border-radius: 10px;
  }
  .card-item .rarity-tag {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--rarity-color);
    font-family: var(--font-display);
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* ---------------- REVEAL OVERLAY (séquentiel) ---------------- */
 .reveal-mode-toggle {
  display: flex;
  gap: 8px;
  z-index: 2;
}
.mode-btn {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: var(--bg-panel-2);
  border: 1px solid var(--border);
  color: var(--ink-dim);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn.active {
  color: var(--bg-void);
  background: var(--ink);
  border-color: var(--ink);
}

.reveal-tap-hint {
  display: none;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--ink-dim);
  text-transform: uppercase;
  animation: tapHintPulse 1.2s ease-in-out infinite;
  z-index: 2;
}
@keyframes tapHintPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
  .reveal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,5,8,0.94);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
  }
  .reveal-overlay.active { display: flex; }
  .reveal-overlay.shake { animation: screenShake 0.4s ease-in-out; }
  @keyframes screenShake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-6px, 3px); }
    40% { transform: translate(6px, -3px); }
    60% { transform: translate(-4px, 2px); }
    80% { transform: translate(4px, -2px); }
  }

  /* halo de fond derrière la carte, teinté selon la rareté à venir */
  .reveal-glow-bg {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--rarity-color, transparent) 0%, transparent 70%);
    opacity: 0;
    filter: blur(20px);
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .reveal-glow-bg.charging { animation: glowPulse var(--charge-duration, 0.8s) ease-in-out; }
  @keyframes glowPulse {
    0% { opacity: 0; transform: scale(0.6); }
    50% { opacity: 0.55; transform: scale(1); }
    100% { opacity: 0.25; transform: scale(1.1); }
  }

  .reveal-progress {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--ink-dim);
    text-transform: uppercase;
    z-index: 2;
  }

  .reveal-stage {
    perspective: 1200px;
    z-index: 2;
  }

  .reveal-card-3d {
    width: 200px;
    height: 280px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .reveal-card-3d.flipped { transform: rotateY(180deg); }

  .reveal-card-3d.charging-commune { animation: chargeCommune 0.8s ease-in-out; }
  .reveal-card-3d.charging-rare { animation: chargeRare 1.2s ease-in-out; }
  .reveal-card-3d.charging-epique { animation: chargeEpique 1.8s ease-in-out; }
  .reveal-card-3d.charging-legendaire { animation: chargeLegendaire 2.6s ease-in-out; }
  .reveal-card-3d.charging-mythique { animation: chargeMythique 3.4s ease-in-out; }

  @keyframes chargeCommune {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-4px) scale(1.02); }
  }
  @keyframes chargeRare {
    0%, 100% { transform: translateY(0) scale(1); }
    25% { transform: translateY(-3px) scale(1.01); }
    50% { transform: translateY(0) scale(1); }
    75% { transform: translateY(-5px) scale(1.03); }
  }
  @keyframes chargeEpique {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    15% { transform: translateY(-3px) rotate(-1deg) scale(1.01); }
    30% { transform: translateY(0) rotate(1deg) scale(1); }
    45% { transform: translateY(-4px) rotate(-1.5deg) scale(1.02); }
    60% { transform: translateY(0) rotate(1.5deg) scale(1.01); }
    80% { transform: translateY(-6px) rotate(-1deg) scale(1.04); }
  }
  @keyframes chargeLegendaire {
    0% { transform: translateY(0) scale(1); }
    12% { transform: translateY(-5px) scale(1.02); }
    24% { transform: translateY(0) scale(1); }
    36% { transform: translateY(-6px) scale(1.03); }
    48% { transform: translateY(0) scale(1.01); }
    62% { transform: translateY(-8px) scale(1.05); }
    74% { transform: translateY(0) scale(1.02); }
    85% { transform: translateY(-4px) scale(1.06); }
    93% { transform: translateY(2px) scale(1.04); }
    100% { transform: translateY(0) scale(1.05); }
  }
  @keyframes chargeMythique {
    0% { transform: translateY(0) rotate(0deg) scale(1); }
    10% { transform: translateY(-5px) rotate(-1deg) scale(1.02); }
    20% { transform: translateY(0) rotate(1deg) scale(1); }
    30% { transform: translateY(-6px) rotate(-1.5deg) scale(1.03); }
    40% { transform: translateY(0) rotate(1.5deg) scale(1.02); }
    50% { transform: translateY(-7px) rotate(-2deg) scale(1.05); }
    60% { transform: translateY(0) rotate(2deg) scale(1.03); }
    68% { transform: translateY(-8px) rotate(-2deg) scale(1.06); }
    76% { transform: translateY(2px) rotate(2deg) scale(1.04); }
    83% { transform: translateY(-9px) rotate(-2.5deg) scale(1.08); }
    89% { transform: translateY(3px) rotate(2.5deg) scale(1.05); }
    95% { transform: translateY(-6px) scale(1.09); }
    100% { transform: translateY(0) scale(1.06); }
  }

  /* symbole "?" qui pulse au-dessus de la carte pendant la charge (épique+) */
  .suspense-mark {
    position: absolute;
    top: -70px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-display);
    font-size: 56px;
    color: var(--rarity-color);
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 0 20px var(--rarity-color);
  }
  .suspense-mark.show-epique { animation: suspenseMarkPulse 1.8s ease-in-out; }
  .suspense-mark.show-legendaire { animation: suspenseMarkPulse 2.6s ease-in-out; }
  .suspense-mark.show-mythique { animation: suspenseMarkPulse 3.4s ease-in-out; }
  @keyframes suspenseMarkPulse {
    0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
    15% { opacity: 0.9; transform: translateX(-50%) scale(1.1); }
    30% { opacity: 0.4; transform: translateX(-50%) scale(0.95); }
    50% { opacity: 0.9; transform: translateX(-50%) scale(1.15); }
    70% { opacity: 0.3; transform: translateX(-50%) scale(0.9); }
    88% { opacity: 1; transform: translateX(-50%) scale(1.25); }
    100% { opacity: 0; transform: translateX(-50%) scale(1.4); }
  }

  /* flash plein écran au moment du flip, uniquement légendaire+ */
  .flip-flash {
    position: fixed;
    inset: 0;
    background: var(--rarity-color, white);
    opacity: 0;
    pointer-events: none;
    z-index: 99;
  }
  .flip-flash.active { animation: flashOnce 0.5s ease-out; }
  @keyframes flashOnce {
    0% { opacity: 0; }
    15% { opacity: 0.85; }
    100% { opacity: 0; }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }
  .card-face.face-back {
    background: linear-gradient(160deg, var(--bg-panel-2), var(--bg-panel));
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-face.face-back .back-symbol {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .card-face.face-front {
    transform: rotateY(180deg);
    background: var(--bg-panel);
    border: 2px solid var(--rarity-color);
    box-shadow: 0 0 50px -10px var(--rarity-color);
  }
  .card-face.face-front img { width: 100%; height: 65%; object-fit: cover; }
  .card-face.face-front .r-info { padding: 8px 10px; }
  .card-face.face-front .r-nom { font-family: var(--font-display); font-size: 14px; }
  .card-face.face-front .r-rarete {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--rarity-color);
  }
  .card-face.face-front.foil::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.5) 48%, rgba(255,255,255,0.15) 52%, transparent 70%);
    background-size: 250% 250%;
    animation: foilSweep 2.2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes foilSweep {
    0% { background-position: 200% 200%; }
    100% { background-position: -50% -50%; }
  }
  .card-face.face-front.pity-tag::before {
    content: 'PITY';
    position: absolute;
    top: 8px;
    right: 8px;
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 0.06em;
    background: var(--c-legendaire);
    color: #1a1204;
    padding: 2px 6px;
    border-radius: 3px;
    z-index: 2;
  }

  .reveal-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
    min-height: 52px;
    z-index: 2;
  }
  .strip-thumb {
    width: 40px;
    height: 56px;
    border-radius: 5px;
    border: 1.5px solid var(--rarity-color);
    overflow: hidden;
    opacity: 0;
    transform: scale(0.7);
    animation: thumbIn 0.3s forwards;
  }
  @keyframes thumbIn { to { opacity: 1; transform: scale(1); } }
  .strip-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .reveal-actions {
    display: flex;
    gap: 12px;
    z-index: 2;
  }

  .reveal-close {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
  }

  .empty-state {
    text-align: center;
    color: var(--ink-dim);
    padding: 40px 20px;
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .nav { padding: 14px 16px; }
    .nav-title { font-size: 16px; }
    .pull-buttons { flex-direction: column; width: 100%; padding: 0 20px; }
  }

  .recap-overlay {
  position: fixed;
  inset: 0;
  background: rgba(4,5,8,0.94);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 101;
  flex-direction: column;
  gap: 20px;
  padding: 20px;
}
.recap-overlay.active { display: flex; }

.recap-title {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.recap-summary {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.recap-tag {
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  padding: 5px 14px;
  border: 1px solid var(--rarity-color);
  color: var(--rarity-color);
  border-radius: 20px;
}

.recap-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  max-width: 800px;
  max-height: 50vh;
  overflow-y: auto;
  padding: 8px;
}
.recap-card {
  width: 110px;
  border-radius: 8px;
  border: 2px solid var(--rarity-color);
  background: var(--bg-panel);
  overflow: hidden;
  text-align: center;
  transition: transform 0.2s;
}
.recap-card.best {
  box-shadow: 0 0 25px -5px var(--rarity-color);
  transform: scale(1.08);
}
.recap-card img { width: 100%; height: 100px; object-fit: cover; }
.recap-card-nom {
  font-family: var(--font-display);
  font-size: 12px;
  padding: 6px 4px 2px;
}
.recap-card-rarete {
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--rarity-color);
  padding-bottom: 6px;
}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-left">
    <a href="https://inspecteurl.github.io/site/jeux.html" class="nav-back">← HorizonCiné</a>
    <div class="nav-title">Anime-Cards</div>
     <a href="social.html"><div class="nav-title">Social</div></a>
  </div>
  <div class="nav-balance">Solde : <span id="balanceDisplay">—</span></div>
</div>

<div class="banniere-tabs" id="banniereTabs">
  <button class="tab-btn active" data-banniere="standard" data-glow="rgba(140,150,180,0.4)" data-cost1="10" data-cost10="100">Pack Standard</button>
  <button class="tab-btn" data-banniere="Detective Conan" data-glow="rgba(76,140,232,0.5)" data-cost1="30" data-cost10="300">Pack Detective Conan</button>
  <button class="tab-btn" data-banniere="Dragon Ball" data-glow="rgba(232,169,76,0.5)" data-cost1="30" data-cost10="300">Pack Dragon Ball</button>
  <button class="tab-btn" data-banniere="Attack on Titan" data-glow="rgba(168,60,60,0.5)" data-cost1="30" data-cost10="300">Pack Attack on Titan</button>

// ============================================
// AUTH — récupère la session existante
// ============================================
async function getSessionOrRedirect() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('statusMsg').textContent = 'Connecte-toi sur HorizonCiné pour accéder à Anime-Cards.';
    document.getElementById('statusMsg').classList.add('error');
    document.getElementById('btnPull1').disabled = true;
    document.getElementById('btnPull10').disabled = true;
    return null;
  }
  return session;
}

// ============================================
// SOLDE
// ============================================
async function refreshBalance() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  const { data, error } = await sb.from('profiles').select('balance').eq('id', user.id).single();
  if (!error && data) {
    document.getElementById('balanceDisplay').textContent = data.balance;
  }
}

// ============================================
// PITY (affichage indicatif, lecture seule côté client)
// ============================================
async function refreshPity() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  const { data } = await sb
    .from('user_pity')
    .select('pulls_depuis_legendaire')
    .eq('user_id', user.id)
    .eq('banniere', activeBanniere)
    .maybeSingle();

  const pulls = data?.pulls_depuis_legendaire ?? 0;
  document.getElementById('pityText').textContent = `Pity légendaire : ${pulls} / 90`;
  document.getElementById('pityBarFill').style.width = `${Math.min(100, (pulls / 90) * 100)}%`;
}

// ============================================
// TIRAGE — appel de l'Edge Function
// ============================================
async function faireTirage(nombre) {
  const session = await getSessionOrRedirect();
  if (!session) return;

  const statusMsg = document.getElementById('statusMsg');
  statusMsg.classList.remove('error');
  statusMsg.textContent = 'Ouverture du pack...';
  document.getElementById('btnPull1').disabled = true;
  document.getElementById('btnPull10').disabled = true;

  try {
    const response = await fetch(`${SUPABASE_URL}/functions/v1/gacha-pull`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ nombre, banniere: activeBanniere }),
    });

    const result = await response.json();

    if (!response.ok) {
      statusMsg.textContent = result.error || 'Erreur lors du tirage.';
      statusMsg.classList.add('error');
      return;
    }

    statusMsg.textContent = '';
    afficherReveal(result.cartes);
    document.getElementById('balanceDisplay').textContent = result.nouveau_solde;
    await refreshPity();
    await refreshCollection();
  } catch (err) {
    statusMsg.textContent = 'Erreur réseau, réessaie.';
    statusMsg.classList.add('error');
  } finally {
    document.getElementById('btnPull1').disabled = false;
    document.getElementById('btnPull10').disabled = false;
  }
}

// ============================================
// ANIMATION DE REVEAL — séquentiel, carte par carte
// ============================================
const CHARGE_DURATION = {
  commune: 800,
  rare: 1200,
  epique: 1800,
  legendaire: 2600,
  mythique: 3400,
};

let skipAllDemande = false;
let resolveEtapeCourante = null;
  let modeAuto = true; // true = auto (timers), false = manuel (clic pour avancer)

function setMode(auto) {
  modeAuto = auto;
  document.getElementById('modeAutoBtn').classList.toggle('active', auto);
  document.getElementById('modeManuelBtn').classList.toggle('active', !auto);
}

document.getElementById('modeAutoBtn').addEventListener('click', () => setMode(true));
document.getElementById('modeManuelBtn').addEventListener('click', () => setMode(false));

// Clic sur l'overlay = avancer en mode manuel (ignore les boutons)
document.getElementById('revealOverlay').addEventListener('click', (e) => {
  if (modeAuto) return;
  if (e.target.closest('#revealSkipAll') || e.target.closest('#revealClose') || e.target.closest('#modeAutoBtn') || e.target.closest('#modeManuelBtn')) return;
  if (resolveEtapeCourante) {
    const r = resolveEtapeCourante;
    resolveEtapeCourante = null;
    r();
  }
});

function attendre(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function afficherReveal(cartes) {
  const overlay = document.getElementById('revealOverlay');
  const card3d = document.getElementById('revealCard3d');
  const cardFront = document.getElementById('revealCardFront');
  const glowBg = document.getElementById('revealGlowBg');
  const progress = document.getElementById('revealProgress');
  const strip = document.getElementById('revealStrip');
  const flash = document.getElementById('flipFlash');
  const btnClose = document.getElementById('revealClose');
  const btnSkipAll = document.getElementById('revealSkipAll');
  const suspenseMark = document.getElementById('suspenseMark');

  skipAllDemande = false;
  strip.innerHTML = '';
  btnClose.style.display = 'none';
  btnSkipAll.style.display = cartes.length > 1 ? 'inline-block' : 'none';
  overlay.classList.add('active');

  for (let i = 0; i < cartes.length; i++) {
    const carte = cartes[i];
    const rarityVar = `var(--c-${carte.rarete})`;
    const isFoil = carte.rarete === 'epique' || carte.rarete === 'legendaire' || carte.rarete === 'mythique';
    const isBigReveal = carte.rarete === 'legendaire' || carte.rarete === 'mythique';

    progress.textContent = cartes.length > 1 ? `Carte ${i + 1} / ${cartes.length}` : '';

    card3d.classList.remove('flipped');
    card3d.className = 'reveal-card-3d';
    card3d.style.setProperty('--rarity-color', rarityVar);
    glowBg.style.setProperty('--rarity-color', rarityVar);
    void card3d.offsetWidth;

    if (!skipAllDemande) {
      const duree = CHARGE_DURATION[carte.rarete] || 500;
      glowBg.style.setProperty('--charge-duration', `${duree}ms`);
      glowBg.classList.remove('charging');
      void glowBg.offsetWidth;
      glowBg.classList.add('charging');
      card3d.classList.add(`charging-${carte.rarete}`);

      suspenseMark.className = 'suspense-mark';
      suspenseMark.style.setProperty('--rarity-color', rarityVar);
      if (isFoil) {
        void suspenseMark.offsetWidth;
        suspenseMark.classList.add(`show-${carte.rarete}`);
      }

      if (modeAuto) {
        await Promise.race([
          attendre(duree),
          new Promise(resolve => { resolveEtapeCourante = resolve; }),
        ]);
      } else {
        document.getElementById('revealTapHint').style.display = 'block';
        await new Promise(resolve => { resolveEtapeCourante = resolve; });
        document.getElementById('revealTapHint').style.display = 'none';
      }
    }

    cardFront.className = `card-face face-front ${isFoil ? 'foil' : ''} ${carte.isPity ? 'pity-tag' : ''}`;
    cardFront.innerHTML = `
      <img src="${carte.image_url}" alt="${carte.nom}">
      <div class="r-info">
        <div class="r-nom">${carte.nom}</div>
        <div class="r-rarete">${carte.rarete}</div>
      </div>
    `;

    if (isBigReveal && !skipAllDemande) {
      flash.style.setProperty('--rarity-color', rarityVar);
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
      overlay.classList.remove('shake');
      void overlay.offsetWidth;
      overlay.classList.add('shake');
    }

    card3d.classList.add('flipped');

    const thumb = document.createElement('div');
    thumb.className = 'strip-thumb';
    thumb.style.setProperty('--rarity-color', rarityVar);
    thumb.innerHTML = `<img src="${carte.image_url}" alt="${carte.nom}">`;
    strip.appendChild(thumb);

    if (!skipAllDemande) {
      const tempsAffichage = isBigReveal ? 1400 : 900;
      if (modeAuto) {
        await Promise.race([
          attendre(tempsAffichage),
          new Promise(resolve => { resolveEtapeCourante = resolve; }),
        ]);
      } else {
        document.getElementById('revealTapHint').style.display = 'block';
        await new Promise(resolve => { resolveEtapeCourante = resolve; });
        document.getElementById('revealTapHint').style.display = 'none';
      }
    }
  }

  progress.textContent = '';
  btnSkipAll.style.display = 'none';
  afficherRecap(cartes);
}

function afficherRecap(cartes) {
  const recapOverlay = document.getElementById('recapOverlay');
  const recapGrid = document.getElementById('recapGrid');
  const recapSummary = document.getElementById('recapSummary');

  const ordreRarete = ['mythique', 'legendaire', 'epique', 'rare', 'commune'];
  const comptage = {};
  cartes.forEach(c => { comptage[c.rarete] = (comptage[c.rarete] || 0) + 1; });

  const meilleure = cartes.reduce((best, c) =>
    ordreRarete.indexOf(c.rarete) < ordreRarete.indexOf(best.rarete) ? c : best
  , cartes[0]);

  recapSummary.innerHTML = ordreRarete
    .filter(r => comptage[r])
    .map(r => `<span class="recap-tag" style="--rarity-color: var(--c-${r});">${comptage[r]} ${r}${comptage[r] > 1 ? 's' : ''}</span>`)
    .join('');

  recapGrid.innerHTML = cartes.map(c => `
    <div class="recap-card ${c.id === meilleure.id ? 'best' : ''}" style="--rarity-color: var(--c-${c.rarete});">
      <img src="${c.image_url}" alt="${c.nom}">
      <div class="recap-card-nom">${c.nom}</div>
      <div class="recap-card-rarete">${c.rarete}</div>
    </div>
  `).join('');

  recapOverlay.classList.add('active');
}

document.getElementById('recapClose').addEventListener('click', () => {
  document.getElementById('recapOverlay').classList.remove('active');
  document.getElementById('revealOverlay').classList.remove('active');
});

document.getElementById('revealSkipAll').addEventListener('click', () => {
  skipAllDemande = true;
  if (resolveEtapeCourante) resolveEtapeCourante();
});

document.getElementById('revealClose').addEventListener('click', () => {
  document.getElementById('revealOverlay').classList.remove('active');
});

    // Prépare le contenu de la face avant juste avant le flip
    cardFront.className = `card-face face-front ${isFoil ? 'foil' : ''} ${carte.isPity ? 'pity-tag' : ''}`;
    cardFront.innerHTML = `
      <img src="${carte.image_url}" alt="${carte.nom}">
      <div class="r-info">
        <div class="r-nom">${carte.nom}</div>
        <div class="r-rarete">${carte.rarete}</div>
      </div>
    `;

    // Flash plein écran + tremblement pour légendaire/mythique
    if (isBigReveal && !skipAllDemande) {
      flash.style.setProperty('--rarity-color', rarityVar);
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
      overlay.classList.remove('shake');
      void overlay.offsetWidth;
      overlay.classList.add('shake');
    }

    card3d.classList.add('flipped');

    // Ajoute la miniature dans la bande du bas
    const thumb = document.createElement('div');
    thumb.className = 'strip-thumb';
    thumb.style.setProperty('--rarity-color', rarityVar);
    thumb.innerHTML = `<img src="${carte.image_url}" alt="${carte.nom}">`;
    strip.appendChild(thumb);

    if (!skipAllDemande) {
      const tempsAffichage = isBigReveal ? 1400 : 900;
      // Phase 2 (affichage après flip) — remplace le second bloc "await Promise.race(...)"
if (modeAuto) {
  await Promise.race([
    attendre(tempsAffichage),
    new Promise(resolve => { resolveEtapeCourante = resolve; }),
  ]);
} else {
  document.getElementById('revealTapHint').style.display = 'block';
  await new Promise(resolve => { resolveEtapeCourante = resolve; });
  document.getElementById('revealTapHint').style.display = 'none';
}
    }
  }

  progress.textContent = '';
  btnSkipAll.style.display = 'none';
  btnClose.style.display = 'inline-block';
}

document.getElementById('revealSkipAll').addEventListener('click', () => {
  skipAllDemande = true;
  if (resolveEtapeCourante) resolveEtapeCourante();
});

document.getElementById('revealClose').addEventListener('click', () => {
  document.getElementById('revealOverlay').classList.remove('active');
});

// ============================================
// COLLECTION
// ============================================
async function refreshCollection() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  // Toutes les cartes du catalogue (pour afficher aussi celles non obtenues, grisées)
  const { data: catalogue } = await sb.from('cards').select('*').eq('is_active', true);
  const { data: possedees } = await sb
    .from('user_cards')
    .select('card_id, quantite')
    .eq('user_id', user.id);

  const quantiteParCarte = {};
  (possedees || []).forEach(pc => { quantiteParCarte[pc.card_id] = pc.quantite; });

  allCards = (catalogue || []).map(c => ({
    ...c,
    quantite: quantiteParCarte[c.id] || 0,
  }));

  const animesUniques = [...new Set(allCards.map(c => c.anime))].sort();
  const filterAnime = document.getElementById('filterAnime');
  const currentAnimeValue = filterAnime.value;
  filterAnime.innerHTML = '<option value="">Tous animes</option>' +
    animesUniques.map(a => `<option value="${a}">${a}</option>`).join('');
  filterAnime.value = currentAnimeValue;

  renderCollection();
}

function renderCollection() {
  const rareteFiltre = document.getElementById('filterRarete').value;
  const animeFiltre = document.getElementById('filterAnime').value;

  const cartesAffichees = allCards.filter(c =>
    (!rareteFiltre || c.rarete === rareteFiltre) &&
    (!animeFiltre || c.anime === animeFiltre)
  );

  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  const nbObtenues = allCards.filter(c => c.quantite > 0).length;

  document.getElementById('collectionCount').textContent =
    `${nbObtenues} / ${allCards.length} cartes obtenues`;

  if (cartesAffichees.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = cartesAffichees.map(c => `
    <div class="card-item ${c.quantite === 0 ? 'locked' : ''}" style="--rarity-color: ${RARITY_COLORS[c.rarete]};">
      <div class="rarity-tag">${c.rarete}</div>
      ${c.quantite > 1 ? `<div class="card-qte">x${c.quantite}</div>` : ''}
      <img src="${c.image_url}" alt="${c.nom}">
      <div class="card-info">
        <div class="card-nom">${c.quantite > 0 ? c.nom : '???'}</div>
        <div class="card-anime">${c.quantite > 0 ? c.anime : ''}</div>
      </div>
    </div>
  `).join('');
}

document.getElementById('filterRarete').addEventListener('change', renderCollection);
document.getElementById('filterAnime').addEventListener('change', renderCollection);

const PACK_DESCRIPTIONS = {
  standard: 'Pool complet, toutes séries confondues.',
  'Detective Conan': 'Cartes Detective Conan uniquement — meilleurs taux épique et plus.',
  'Dragon Ball': 'Cartes Dragon Ball uniquement (DB, Z, Super, GT) — meilleurs taux.',

};

document.getElementById('banniereTabs').addEventListener('click', async (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeBanniere = btn.dataset.banniere;
  document.getElementById('packArt').style.setProperty('--pack-glow', btn.dataset.glow);
  document.getElementById('packDescription').textContent = PACK_DESCRIPTIONS[activeBanniere] || '';

  const cost1 = btn.dataset.cost1;
  const cost10 = btn.dataset.cost10;
  document.getElementById('btnPull1').textContent = `Tirage x1 — ${cost1}`;
  document.getElementById('btnPull10').textContent = `Tirage x10 — ${cost10}`;

  await refreshPity();
});

// BOUTONS DE TIRAGE
// ============================================
document.getElementById('btnPull1').addEventListener('click', () => faireTirage(1));
document.getElementById('btnPull10').addEventListener('click', () => faireTirage(10));
document.getElementById('packArt').addEventListener('click', () => faireTirage(1));

// ============================================
// INIT
// ============================================
(async function init() {
  const session = await getSessionOrRedirect();
  if (!session) return;
  await refreshBalance();
  await refreshPity();
  await refreshCollection();
})();
</script>
