<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joueurs — HorizonCiné Anime-Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  /* ---------------- BATTLE ARENA ---------------- */
.battle-overlay {
  position: fixed; inset: 0; background: rgba(4,5,8,0.96);
  display: none; align-items: center; justify-content: center;
  z-index: 200; flex-direction: column; gap: 18px; padding: 20px;
}
.battle-overlay.active { display: flex; }
.battle-overlay.shake-battle { animation: battleShake 0.35s ease-in-out; }
@keyframes battleShake {
  0%, 100% { transform: translate(0,0); }
  25% { transform: translate(-5px, 2px); }
  50% { transform: translate(5px, -2px); }
  75% { transform: translate(-3px, 2px); }
}

.battle-arena {
  display: flex; align-items: center; justify-content: center;
  gap: 60px; width: 100%; max-width: 700px;
}
.battle-fighter { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 160px; }
.battle-fighter.mine { order: 1; }
.battle-fighter.theirs { order: 2; }

.battle-card-img {
  width: 130px; height: 182px; border-radius: 10px; object-fit: cover;
  border: 2px solid var(--rarity-color, var(--border));
  box-shadow: 0 0 30px -8px var(--rarity-color, transparent);
  transition: transform 0.15s;
}
.battle-card-img.attacking.mine { animation: lungeRight 0.4s ease-in-out; }
.battle-card-img.attacking.theirs { animation: lungeLeft 0.4s ease-in-out; }
@keyframes lungeRight {
  0% { transform: translateX(0); } 40% { transform: translateX(24px) scale(1.05); } 100% { transform: translateX(0); }
}
@keyframes lungeLeft {
  0% { transform: translateX(0); } 40% { transform: translateX(-24px) scale(1.05); } 100% { transform: translateX(0); }
}
.battle-card-img.hit { animation: hitFlash 0.3s ease-in-out; }
@keyframes hitFlash {
  0%, 100% { filter: brightness(1); } 30% { filter: brightness(2.5) saturate(0); }
}
.battle-card-img.ko { animation: koFall 0.6s ease-in forwards; }
@keyframes koFall {
  0% { transform: rotate(0) translateY(0); opacity: 1; }
  100% { transform: rotate(15deg) translateY(40px); opacity: 0.15; }
}

.battle-fighter-nom {
  font-family: var(--font-display); font-size: 13px; text-transform: uppercase; letter-spacing: 0.03em;
}
.battle-hp-bar { width: 130px; height: 10px; background: var(--bg-panel-2); border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
.battle-hp-fill { height: 100%; background: linear-gradient(90deg, #6ee88a, #4ec96f); transition: width 0.5s ease; }
.battle-hp-fill.low { background: linear-gradient(90deg, #e8a94c, #d68d2f); }
.battle-hp-fill.crit-low { background: linear-gradient(90deg, #f06060, #d33f3f); }
.battle-hp-text { font-size: 11px; color: var(--ink-dim); }

.battle-vs { font-family: var(--font-display); font-size: 22px; color: var(--ink-dim); }

.battle-log-line {
  font-family: var(--font-body); font-size: 14px; min-height: 24px; text-align: center;
  color: var(--ink); letter-spacing: 0.01em;
}
.battle-log-line .dmg { color: #f06060; font-family: var(--font-display); }
.battle-log-line .crit { color: var(--c-legendaire); font-weight: 600; }

.battle-skip-btn {
  font-family: var(--font-display); font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase;
  background: var(--bg-panel-2); border: 1px solid var(--border); color: var(--ink-dim);
  padding: 8px 18px; border-radius: 4px; cursor: pointer;
}

@media (max-width: 600px) {
  .battle-arena { gap: 24px; }
  .battle-card-img { width: 90px; height: 126px; }
  .battle-fighter { width: 100px; }
  .battle-hp-bar { width: 100px; }
}
  
  :root {
    --bg-void: #0b0e14;
    --bg-panel: #131826;
    --bg-panel-2: #1a2032;
    --ink: #edeef2;
    --ink-dim: #8a90a3;
    --border: rgba(255,255,255,0.08);
    --c-commune: #8a90a3;
    --c-rare: #4c8ce8;
    --c-epique: #a855f7;
    --c-legendaire: #e8a94c;
    --c-mythique: #ff6fd8;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg-void); color: var(--ink); font-family: var(--font-body); min-height: 100vh; }
  a { color: inherit; }

  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(11,14,20,0.9); backdrop-filter: blur(10px); z-index: 20;
  }
  .nav-left { display: flex; align-items: center; gap: 18px; }
  .nav-back { font-size: 13px; color: var(--ink-dim); text-decoration: none; }
  .nav-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .nav-balance { font-family: var(--font-display); font-size: 15px; padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-panel); }
  .nav-balance span { color: var(--c-legendaire); }

  .tabs-main { display: flex; gap: 10px; justify-content: center; padding: 24px 20px 0; flex-wrap: wrap; }
  .tab-main {
    font-family: var(--font-display); font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase;
    background: var(--bg-panel); border: 1px solid var(--border); color: var(--ink-dim);
    padding: 10px 22px; border-radius: 4px; cursor: pointer;
  }
  .tab-main.active { color: var(--bg-void); background: var(--ink); border-color: var(--ink); }

  .content-section { max-width: 1000px; margin: 0 auto; padding: 30px 24px 80px; display: none; }
  .content-section.active { display: block; }

  .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
  .search-bar input {
    flex: 1; background: var(--bg-panel); border: 1px solid var(--border); color: var(--ink);
    padding: 10px 14px; border-radius: 4px; font-family: var(--font-body); font-size: 14px;
  }

  .player-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 16px; margin-bottom: 8px;
  }
  .player-name { font-family: var(--font-display); font-size: 15px; }
  .btn {
    font-family: var(--font-display); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-panel-2);
    color: var(--ink); cursor: pointer;
  }
  .btn:hover { border-color: var(--ink-dim); }
  .btn.primary { background: var(--c-rare); color: white; border-color: var(--c-rare); }
  .btn.danger { background: transparent; color: #f06060; border-color: #f06060; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .collection-panel { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .collection-panel h3 { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.03em; }
  .panel-actions { display: flex; gap: 10px; margin-bottom: 16px; }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
  .mini-card {
    aspect-ratio: 3/4.2; border-radius: 6px; background: var(--bg-panel-2);
    border: 1px solid var(--rarity-color, var(--border)); position: relative; overflow: hidden;
    display: flex; flex-direction: column; cursor: default;
  }
  .mini-card img { width: 100%; height: 62%; object-fit: cover; }
  .mini-card .mc-info { padding: 5px 6px; flex: 1; }
  .mini-card .mc-nom { font-family: var(--font-display); font-size: 11px; line-height: 1.15; }
  .mini-card .mc-qte {
    position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: var(--ink);
    font-size: 10px; font-family: var(--font-display); padding: 1px 6px; border-radius: 8px;
  }
  .mini-card.selectable { cursor: pointer; }
  .mini-card.selectable.selected { outline: 2px solid var(--c-legendaire); }
  .mini-card.selectable:hover { transform: translateY(-2px); transition: transform 0.1s; }
.mini-card .mc-rarity {
  position: absolute; top: 5px; left: 5px;
  font-family: var(--font-display); font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.03em;
  padding: 1px 6px; border-radius: 8px;
  color: #0b0e14; background: var(--rarity-color, var(--ink-dim));
}

.collection-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.stat-chip {
  font-family: var(--font-display); font-size: 11px; letter-spacing: 0.03em; text-transform: uppercase;
  padding: 6px 12px; border-radius: 4px; background: var(--bg-panel-2); border: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.stat-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dot-color, var(--ink-dim)); }

.collection-filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-select {
  background: var(--bg-panel); border: 1px solid var(--border); color: var(--ink);
  padding: 8px 12px; border-radius: 4px; font-family: var(--font-body); font-size: 13px;
}
  /* ---------------- MODALS ---------------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(4,5,8,0.85); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 24px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
  }
  .modal-box h3 { font-family: var(--font-display); margin-top: 0; text-transform: uppercase; letter-spacing: 0.03em; }
  .trade-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 16px 0; }
  .trade-columns h4 { font-size: 13px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.03em; }
  .mini-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; max-height: 320px; overflow-y: auto; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

  .challenge-input { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
  .challenge-input input {
    background: var(--bg-panel-2); border: 1px solid var(--border); color: var(--ink);
    padding: 8px 12px; border-radius: 4px; width: 120px; font-family: var(--font-body);
  }

  .duel-status-text { font-size: 13px; color: var(--ink-dim); margin: 12px 0; }

  /* ---------------- TRADES / DUELS LISTS ---------------- */
  .sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .sub-tab {
    font-family: var(--font-display); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-panel);
    color: var(--ink-dim); cursor: pointer;
  }
  .sub-tab.active { color: var(--ink); border-color: var(--ink-dim); }

  .list-item {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .list-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .list-item-title { font-family: var(--font-display); font-size: 14px; }
  .list-item-status { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-dim); }
  .list-item-detail { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 10px; }
  .list-item-actions { display: flex; gap: 8px; }

  .empty-msg { color: var(--ink-dim); font-size: 13px; padding: 20px 0; text-align: center; }

  /* ---------------- RESULT BANNER ---------------- */
  #resultBox { text-align: center; }
  .result-title { font-family: var(--font-display); font-size: 26px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .result-title.win { color: var(--c-legendaire); }
  .result-title.lose { color: #f06060; }
  .result-title.draw { color: var(--ink-dim); }
  .result-scores { display: flex; justify-content: center; gap: 30px; margin: 16px 0; }
  .result-score-block { font-size: 13px; }
  .result-score-block .score-num { font-family: var(--font-display); font-size: 22px; }
</style>
</head>

<script>
const SUPABASE_URL = 'https://wuagahavmbugmnuzsouf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1YWdhaGF2bWJ1Z21udXpzb3VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI2MDM2NTksImV4cCI6MjA2ODE3OTY1OX0.mjf9cUleV_oq8TsWeKvPVOJSGPc98AyGyfJeA-Tpvho';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const RARITY_COLORS = {
  commune: 'var(--c-commune)', rare: 'var(--c-rare)', epique: 'var(--c-epique)',
  legendaire: 'var(--c-legendaire)', mythique: 'var(--c-mythique)',
};

let currentUser = null;
let selectedPlayer = null; // { id, username }
let tradeSelectionMine = new Set();
let tradeSelectionTheirs = new Set();
let currentDuelId = null;
let duelSelection = new Set();
let realtimeChannel = null;

async function callFunction(name, payload) {
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Erreur inconnue');
  return json;
}

// ============================================
// NAV / BALANCE
// ============================================
async function refreshBalance() {
  const { data } = await sb.from('profiles').select('balance').eq('id', currentUser.id).single();
  if (data) document.getElementById('balanceDisplay').textContent = data.balance;
}

// ============================================
// TABS
// ============================================
document.querySelectorAll('.tab-main').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-main').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    if (btn.dataset.tab === 'echanges') loadTrades('recus');
    if (btn.dataset.tab === 'duels') loadDuels();
  });
});

document.querySelectorAll('.sub-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTrades(btn.dataset.subtab);
  });
});

// ============================================
// RECHERCHE DE JOUEURS
// ============================================
async function rechercherJoueurs() {
  const query = document.getElementById('searchInput').value.trim();
  const { data, error } = await sb
    .from('profiles')
    .select('id, username')
    .ilike('username', `%${query}%`)
    .neq('id', currentUser.id)
    .limit(20);

  const container = document.getElementById('playersList');
  if (error || !data || data.length === 0) {
    container.innerHTML = '<div class="empty-msg">Aucun joueur trouvé.</div>';
    return;
  }

  container.innerHTML = data.map(p => `
    <div class="player-row">
      <div class="player-name">${p.username}</div>
      <button class="btn primary" onclick="voirCollection('${p.id}', '${p.username.replace(/'/g, "\\'")}')">Voir la collection</button>
    </div>
  `).join('');
}
document.getElementById('searchBtn').addEventListener('click', rechercherJoueurs);
document.getElementById('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') rechercherJoueurs(); });

// ============================================
// VOIR LA COLLECTION D'UN JOUEUR
// ============================================
const RARITY_LABELS = {
  commune: 'Commune', rare: 'Rare', epique: 'Épique',
  legendaire: 'Légendaire', mythique: 'Mythique',
};

let selectedPlayerCards = []; // toutes les cartes brutes du joueur consulté

async function voirCollection(playerId, username) {
  selectedPlayer = { id: playerId, username };

  const { data: cards, error } = await sb
    .from('user_cards')
    .select('id, quantite, card:cards(nom, anime, rarete, image_url)')
    .eq('user_id', playerId);

  const panel = document.getElementById('collectionPanel');
  document.getElementById('collectionPlayerName').textContent = `Collection de ${username}`;
  panel.style.display = 'block';

  if (error || !cards || cards.length === 0) {
    selectedPlayerCards = [];
    document.getElementById('collectionStats').innerHTML = '';
    document.getElementById('filterAnime').innerHTML = '<option value="">Tous animes</option>';
    document.getElementById('collectionGrid').innerHTML = '<div class="empty-msg">Ce joueur n\'a encore aucune carte.</div>';
    return;
  }

  selectedPlayerCards = cards;
  peuplerFiltreAnime(cards);
  afficherStatsCollection(cards);
  renderCollectionGrid();
}
window.voirCollection = voirCollection;

function peuplerFiltreAnime(cards) {
  const animes = [...new Set(cards.map(c => c.card.anime))].sort();
  const select = document.getElementById('filterAnime');
  const valeurActuelle = select.value;
  select.innerHTML = '<option value="">Tous animes</option>' +
    animes.map(a => `<option value="${a}">${a}</option>`).join('');
  select.value = animes.includes(valeurActuelle) ? valeurActuelle : '';
}

function afficherStatsCollection(cards) {
  const counts = {};
  cards.forEach(c => { counts[c.card.rarete] = (counts[c.card.rarete] || 0) + 1; });

  const ordre = ['mythique', 'legendaire', 'epique', 'rare', 'commune'];
  const html = ordre
    .filter(r => counts[r])
    .map(r => `
      <div class="stat-chip" style="--dot-color:${RARITY_COLORS[r]};">
        <span class="dot"></span>${RARITY_LABELS[r]} : ${counts[r]}
      </div>
    `).join('');

  document.getElementById('collectionStats').innerHTML = html;
}

function renderCollectionGrid() {
  const rareteFiltre = document.getElementById('filterRarete').value;
  const animeFiltre = document.getElementById('filterAnime').value;

  let cartes = selectedPlayerCards;
  if (rareteFiltre) cartes = cartes.filter(c => c.card.rarete === rareteFiltre);
  if (animeFiltre) cartes = cartes.filter(c => c.card.anime === animeFiltre);

  const grid = document.getElementById('collectionGrid');
  if (cartes.length === 0) {
    grid.innerHTML = '<div class="empty-msg">Aucune carte ne correspond à ce filtre.</div>';
    return;
  }

  grid.innerHTML = cartes.map(c => `
    <div class="mini-card" style="--rarity-color:${RARITY_COLORS[c.card.rarete]};">
      <div class="mc-rarity">${RARITY_LABELS[c.card.rarete]}</div>
      ${c.quantite > 1 ? `<div class="mc-qte">x${c.quantite}</div>` : ''}
      <img src="${c.card.image_url}" alt="${c.card.nom}">
      <div class="mc-info"><div class="mc-nom">${c.card.nom}</div></div>
    </div>
  `).join('');
}

document.getElementById('filterRarete').addEventListener('change', renderCollectionGrid);
document.getElementById('filterAnime').addEventListener('change', renderCollectionGrid);

document.getElementById('btnProposeTrade').addEventListener('click', async () => {
  if (!selectedPlayer) return;
  tradeSelectionMine = new Set();
  tradeSelectionTheirs = new Set();
  document.getElementById('tradeTargetName').textContent = selectedPlayer.username;
  document.getElementById('tradeStatusMsg').textContent = '';

  const { data: mesCartes } = await sb.from('user_cards').select('id, quantite, card:cards(nom, rarete, image_url)').eq('user_id', currentUser.id);
  const { data: sesCartes } = await sb.from('user_cards').select('id, quantite, card:cards(nom, rarete, image_url)').eq('user_id', selectedPlayer.id);

  renderTradeGrid('tradeMyCards', mesCartes || [], tradeSelectionMine);
  renderTradeGrid('tradeTheirCards', sesCartes || [], tradeSelectionTheirs);

  document.getElementById('tradeModal').classList.add('active');
});

function renderTradeGrid(containerId, cartes, selectionSet) {
  const container = document.getElementById(containerId);
  if (cartes.length === 0) {
    container.innerHTML = '<div class="empty-msg">Aucune carte.</div>';
    return;
  }
  container.innerHTML = cartes.map(c => `
    <div class="mini-card selectable" data-id="${c.id}" style="--rarity-color:${RARITY_COLORS[c.card.rarete]};" onclick="toggleSelection('${containerId}', '${c.id}')">
      ${c.quantite > 1 ? `<div class="mc-qte">x${c.quantite}</div>` : ''}
      <img src="${c.card.image_url}" alt="${c.card.nom}">
      <div class="mc-info"><div class="mc-nom">${c.card.nom}</div></div>
    </div>
  `).join('');
}

function toggleSelection(containerId, cardId) {
  const set = containerId === 'tradeMyCards' ? tradeSelectionMine
            : containerId === 'tradeTheirCards' ? tradeSelectionTheirs
            : duelSelection;

  if (set.has(cardId)) set.delete(cardId);
  else {
    if (containerId === 'duelRoomCards' && set.size >= 3) return; // max 3 en duel
    set.add(cardId);
  }

  const el = document.querySelector(`#${containerId} [data-id="${cardId}"]`);
  if (el) el.classList.toggle('selected');
}
window.toggleSelection = toggleSelection;

async function loadTrades(direction) {
  const colonne = direction === 'recus' ? 'receveur_id' : 'proposeur_id';
  const { data: trades, error } = await sb
    .from('trades')
    .select('*')
    .eq(colonne, currentUser.id)
    .order('created_at', { ascending: false });

  const container = document.getElementById('tradesList');
  if (error || !trades || trades.length === 0) {
    container.innerHTML = '<div class="empty-msg">Aucun échange ici.</div>';
    return;
  }

  const html = await Promise.all(trades.map(async (t) => {
    const autreId = direction === 'recus' ? t.proposeur_id : t.receveur_id;
    const { data: autreProfile } = await sb.from('profiles').select('username').eq('id', autreId).single();
    const nomAutre = autreProfile?.username || 'Joueur inconnu';

    const nomsOffertes = await nomsDesCartes(t.cartes_offertes);
    const nomsDemandees = await nomsDesCartes(t.cartes_demandees);

    let actions = '';
    if (t.statut === 'pending' && direction === 'recus') {
      actions = `
        <button class="btn primary" onclick="repondreTrade('${t.id}', 'accepted')">Accepter</button>
        <button class="btn danger" onclick="repondreTrade('${t.id}', 'refused')">Refuser</button>
      `;
    } else if (t.statut === 'pending' && direction === 'envoyes') {
      actions = `<button class="btn danger" onclick="annulerTrade('${t.id}')">Annuler</button>`;
    }

    return `
      <div class="list-item">
        <div class="list-item-header">
          <div class="list-item-title">${direction === 'recus' ? 'De' : 'À'} ${nomAutre}</div>
          <div class="list-item-status">${t.statut}</div>
        </div>
        <div class="list-item-detail">Offre : ${nomsOffertes.join(', ')}<br>Contre : ${nomsDemandees.join(', ')}</div>
        <div class="list-item-actions">${actions}</div>
      </div>
    `;
  }));

  container.innerHTML = html.join('');
}

async function nomsDesCartes(userCardIds) {
  if (!userCardIds || userCardIds.length === 0) return [];
  const { data } = await sb.from('user_cards').select('id, card:cards(nom)').in('id', userCardIds);
  return (data || []).map(c => c.card?.nom || '???');
}

async function repondreTrade(tradeId, reponse) {
  try {
    await callFunction('trade-action', { action: 'repondre', trade_id: tradeId, reponse });
    loadTrades('recus');
    refreshBalance();
  } catch (err) {
    alert(err.message);
  }
}
window.repondreTrade = repondreTrade;

async function annulerTrade(tradeId) {
  try {
    await callFunction('trade-action', { action: 'annuler', trade_id: tradeId });
    loadTrades('envoyes');
  } catch (err) {
    alert(err.message);
  }
}
window.annulerTrade = annulerTrade;

async function loadDuels() {
  const { data: battles, error } = await sb
    .from('battles')
    .select('*')
    .or(`attacker_id.eq.${currentUser.id},defender_id.eq.${currentUser.id}`)
    .order('created_at', { ascending: false });

  const container = document.getElementById('duelsList');
  if (error || !battles || battles.length === 0) {
    container.innerHTML = '<div class="empty-msg">Aucun duel pour l\'instant.</div>';
    return;
  }

  const html = await Promise.all(battles.map(async (b) => {
    const jeSuisAttaquant = b.attacker_id === currentUser.id;
    const autreId = jeSuisAttaquant ? b.defender_id : b.attacker_id;
    const { data: autreProfile } = await sb.from('profiles').select('username').eq('id', autreId).single();
    const nomAutre = autreProfile?.username || 'Joueur inconnu';

    let actions = '';
    let detail = `Mise : ${b.mise} pièces`;

    if (b.statut === 'en_attente' && !jeSuisAttaquant) {
      actions = `
        <button class="btn primary" onclick="repondreDuel('${b.id}', 'accepted')">Accepter</button>
        <button class="btn danger" onclick="repondreDuel('${b.id}', 'refused')">Refuser</button>
      `;
    } else if (b.statut === 'en_selection') {
      const dejaChoisi = jeSuisAttaquant ? b.attacker_cards : b.defender_cards;
      actions = dejaChoisi
        ? `<span class="list-item-status">En attente de l'adversaire...</span>`
        : `<button class="btn primary" onclick="ouvrirSalleDuel('${b.id}')">Choisir mes cartes</button>`;
    } else if (b.statut === 'resolu') {
      const jeGagne = (jeSuisAttaquant && b.resultat === 'attacker_win') || (!jeSuisAttaquant && b.resultat === 'defender_win');
      detail += ` — ${b.resultat === 'draw' ? 'Égalité' : (jeGagne ? 'Victoire' : 'Défaite')}`;
    }

    return `
      <div class="list-item">
        <div class="list-item-header">
          <div class="list-item-title">${jeSuisAttaquant ? 'Défi envoyé à' : 'Défié par'} ${nomAutre}</div>
          <div class="list-item-status">${b.statut}</div>
        </div>
        <div class="list-item-detail">${detail}</div>
        <div class="list-item-actions">${actions}</div>
      </div>
    `;
  }));

  container.innerHTML = html.join('');
}

async function repondreDuel(battleId, reponse) {
  try {
    await callFunction('battle-action', { action: 'repondre', battle_id: battleId, reponse });
    loadDuels();
  } catch (err) {
    alert(err.message);
  }
}
window.repondreDuel = repondreDuel;

  document.getElementById('duelRoomStatus').textContent = '';

  const { data: mesCartes } = await sb
    .from('user_cards')
    .select('id, quantite, card:cards(nom, rarete, attaque, defense, vitesse, image_url)')
    .eq('user_id', currentUser.id);

  const container = document.getElementById('duelRoomCards');
  if (!mesCartes || mesCartes.length === 0) {
    container.innerHTML = '<div class="empty-msg">Tu n\'as aucune carte à engager.</div>';
  } else {
    container.innerHTML = mesCartes.map(c => `
      <div class="mini-card selectable" data-id="${c.id}" style="--rarity-color:${RARITY_COLORS[c.card.rarete]};" onclick="toggleSelection('duelRoomCards', '${c.id}')">
        <img src="${c.card.image_url}" alt="${c.card.nom}">
        <div class="mc-info">
          <div class="mc-nom">${c.card.nom}</div>
          <div style="font-size:10px;color:var(--ink-dim);">PUI ${c.card.attaque + c.card.defense + c.card.vitesse}</div>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('duelRoomModal').classList.add('active');
  souscrireDuel(battleId);

window.ouvrirSalleDuel = ouvrirSalleDuel;

document.getElementById('submitDuelCardsBtn').addEventListener('click', async () => {
  const statusEl = document.getElementById('duelRoomStatus');
  if (duelSelection.size === 0) {
    statusEl.textContent = 'Choisis au moins une carte.';
    return;
  }
  try {
    const result = await callFunction('battle-action', {
      action: 'choisir_cartes',
      battle_id: currentDuelId,
      user_cards_ids: [...duelSelection],
    });
    if (result.battle?.statut === 'resolu') {
      afficherResultatDuel(result.battle);
    } else {
      statusEl.textContent = 'Équipe validée, en attente de l\'adversaire...';
    }
  } catch (err) {
    statusEl.textContent = err.message;
  }
});

document.getElementById('closeDuelRoomBtn').addEventListener('click', () => {
  document.getElementById('duelRoomModal').classList.remove('active');
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
});

function souscrireDuel(battleId) {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel(`battle-${battleId}`)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'battles', filter: `id=eq.${battleId}` }, (payload) => {
      const battle = payload.new;
      if (battle.statut === 'resolu') {
        afficherResultatDuel(battle);
      }
    })
    .subscribe();
}

async function chargerInfosEquipe(userCardIds) {
  const { data } = await sb
    .from('user_cards')
    .select('id, card:cards(nom, rarete, image_url, vie)')
    .in('id', userCardIds);
  const map = new Map((data || []).map(c => [c.id, c.card]));
  return userCardIds.map(id => map.get(id)).filter(Boolean);
}

async function afficherResultatDuel(battle) {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  document.getElementById('duelRoomModal').classList.remove('active');

  const jeSuisAttaquant = battle.attacker_id === currentUser.id;
  const mesIds = jeSuisAttaquant ? battle.attacker_cards : battle.defender_cards;
  const leursIds = jeSuisAttaquant ? battle.defender_cards : battle.attacker_cards;

  const mesCartesInfo = await chargerInfosEquipe(mesIds);
  const leursCartesInfo = await chargerInfosEquipe(leursIds);

  await jouerAnimationCombat(battle, mesCartesInfo, leursCartesInfo);

  const jeGagne = (jeSuisAttaquant && battle.resultat === 'attacker_win') || (!jeSuisAttaquant && battle.resultat === 'defender_win');
  const estEgalite = battle.resultat === 'draw';

  const titre = estEgalite ? 'Égalité' : (jeGagne ? 'Victoire !' : 'Défaite');
  const classe = estEgalite ? 'draw' : (jeGagne ? 'win' : 'lose');

  document.getElementById('resultBox').innerHTML = `
    <div class="result-title ${classe}">${titre}</div>
    ${battle.mise > 0 ? `<div class="duel-status-text">Mise : ${battle.mise} pièces</div>` : ''}
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn primary" onclick="document.getElementById('resultModal').classList.remove('active')">Fermer</button>
    </div>
  `;
  document.getElementById('resultModal').classList.add('active');
  refreshBalance();
  loadDuels();
}

const SOUNDS = {
  attack: new Audio('sounds/attack.mp3'),
  crit: new Audio('sounds/crit.mp3'),
  ko: new Audio('sounds/ko.mp3'),
  victory: new Audio('sounds/victory.mp3'),
};
function jouerSon(nom) {
  try {
    const s = SOUNDS[nom];
    s.currentTime = 0;
    s.play().catch(() => {});
  } catch (e) {}
}

let battleSkipDemande = false;
let battleResolveEtape = null;

function battleAttendre(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function battleAttendreEtape(ms) {
  if (battleSkipDemande) return;
  await Promise.race([
    battleAttendre(ms),
    new Promise(resolve => { battleResolveEtape = resolve; }),
  ]);
}

document.getElementById('battleSkipBtn').addEventListener('click', () => {
  battleSkipDemande = true;
  if (battleResolveEtape) battleResolveEtape();
});

// battle: la ligne complète de la table `battles` (avec battle.log.tours)
// mesCartesInfo / leursCartesInfo: tableaux { id, nom, rarete, image_url, vie } dans l'ordre d'engagement
async function jouerAnimationCombat(battle, mesCartesInfo, leursCartesInfo) {
  const overlay = document.getElementById('battleOverlay');
  const logLine = document.getElementById('battleLogLine');
  const myImg = document.getElementById('myFighterImg');
  const theirImg = document.getElementById('theirFighterImg');
  const myNom = document.getElementById('myFighterNom');
  const theirNom = document.getElementById('theirFighterNom');
  const myHpFill = document.getElementById('myHpFill');
  const theirHpFill = document.getElementById('theirHpFill');
  const myHpText = document.getElementById('myHpText');
  const theirHpText = document.getElementById('theirHpText');

  battleSkipDemande = false;
  overlay.classList.add('active');

  const jeSuisAttaquant = battle.attacker_id === currentUser.id;

  // index de la carte active de chaque côté
  let myIdx = 0, theirIdx = 0;
  let myCarte = mesCartesInfo[myIdx];
  let theirCarte = leursCartesInfo[theirIdx];
  let myPvMax = myCarte.vie, theirPvMax = theirCarte.vie;
  let myPv = myPvMax, theirPv = theirPvMax;

  function setFighter(side, carte, pv, pvMax) {
    const img = side === 'mine' ? myImg : theirImg;
    const nomEl = side === 'mine' ? myNom : theirNom;
    const fillEl = side === 'mine' ? myHpFill : theirHpFill;
    const textEl = side === 'mine' ? myHpText : theirHpText;
    img.src = carte.image_url;
    img.style.setProperty('--rarity-color', `var(--c-${carte.rarete})`);
    nomEl.textContent = carte.nom;
    const pct = Math.max(0, (pv / pvMax) * 100);
    fillEl.style.width = `${pct}%`;
    fillEl.classList.toggle('low', pct <= 50 && pct > 20);
    fillEl.classList.toggle('crit-low', pct <= 20);
    textEl.textContent = `${Math.max(0, Math.round(pv))} / ${pvMax}`;
  }

  setFighter('mine', myCarte, myPv, myPvMax);
  setFighter('theirs', theirCarte, theirPv, theirPvMax);
  logLine.textContent = 'Le combat commence !';
  await battleAttendreEtape(1000);

  for (const evt of battle.log.tours) {
    if (evt.type === 'ko') {
      const cSide = evt.side === (jeSuisAttaquant ? 'attacker' : 'defender') ? 'mine' : 'theirs';
      const img = cSide === 'mine' ? myImg : theirImg;
      logLine.innerHTML = `<span class="crit">${evt.carte_nom} est K.O. !</span>`;
      jouerSon('ko');
      img.classList.add('ko');
      await battleAttendreEtape(900);
      img.classList.remove('ko');
      continue;
    }
    if (evt.type === 'changement_carte') {
      const side = evt.side === (jeSuisAttaquant ? 'attacker' : 'defender') ? 'mine' : 'theirs';
      if (side === 'mine') {
        myIdx++; myCarte = mesCartesInfo[myIdx]; myPvMax = myCarte.vie; myPv = myPvMax;
        setFighter('mine', myCarte, myPv, myPvMax);
      } else {
        theirIdx++; theirCarte = leursCartesInfo[theirIdx]; theirPvMax = theirCarte.vie; theirPv = theirPvMax;
        setFighter('theirs', theirCarte, theirPv, theirPvMax);
      }
      logLine.textContent = `${evt.nouvelle_carte} entre en combat !`;
      await battleAttendreEtape(800);
      continue;
    }

    // tour d'attaque normal
    const attSide = evt.attaquant_side === (jeSuisAttaquant ? 'attacker' : 'defender') ? 'mine' : 'theirs';
    const defSide = attSide === 'mine' ? 'theirs' : 'mine';
    const attImg = attSide === 'mine' ? myImg : theirImg;
    const defImg = defSide === 'mine' ? myImg : theirImg;

    attImg.classList.add('attacking', attSide);
    jouerSon(evt.critique ? 'crit' : 'attack');
    await battleAttendreEtape(350);
    attImg.classList.remove('attacking', attSide);

    defImg.classList.add('hit');
    overlay.classList.add('shake-battle');
    logLine.innerHTML = `${evt.carte_nom} inflige <span class="dmg">${evt.degats}</span> dégâts${evt.critique ? ' <span class="crit">— COUP CRITIQUE !</span>' : ''}`;

    if (defSide === 'mine') { myPv = evt.pv_restant_cible; setFighter('mine', myCarte, myPv, myPvMax); }
    else { theirPv = evt.pv_restant_cible; setFighter('theirs', theirCarte, theirPv, theirPvMax); }

    await battleAttendreEtape(200);
    defImg.classList.remove('hit');
    overlay.classList.remove('shake-battle');

    await battleAttendreEtape(700);
  }

  const jeGagne = (jeSuisAttaquant && battle.resultat === 'attacker_win') || (!jeSuisAttaquant && battle.resultat === 'defender_win');
  logLine.textContent = battle.resultat === 'draw' ? 'Égalité !' : (jeGagne ? 'Victoire !' : 'Défaite...');
  if (jeGagne) jouerSon('victory');
  await battleAttendreEtape(1500);

  overlay.classList.remove('active');
}

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.body.innerHTML = '<div class="empty-msg" style="padding-top:60px;">Connecte-toi sur HorizonCiné pour accéder à cette page.</div>';
    return;
  }
  currentUser = session.user;
  await refreshBalance();
})();
